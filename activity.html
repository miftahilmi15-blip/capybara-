<!DOCTYPE html>
<html lang="id">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: transparent; color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .log-item { border-left: 2px solid rgba(34, 211, 238, 0.3); padding-left: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h2 class="text-xs font-black text-cyan-500 uppercase tracking-widest mb-4">System Activity</h2>
    <div class="log-item">
        <div class="text-[10px] text-cyan-400 font-bold">10:15 AM</div>
        <div class="text-sm font-semibold">Node synchronization complete.</div>
    </div>
    <div class="log-item">
        <div class="text-[10px] text-gray-500 font-bold">09:42 AM</div>
        <div class="text-sm font-semibold text-gray-400">Security protocol updated to v2.4</div>
    </div>
</body>
</html>

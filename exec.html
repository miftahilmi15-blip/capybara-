<!DOCTYPE html>
<html lang="id">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: transparent; color: white; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .exec-circle { width: 120px; height: 120px; border: 2px solid #22d3ee; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(34, 211, 238, 0.2); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
    </style>
</head>
<body>
    <div class="exec-circle">
        <div class="text-cyan-400 font-black text-xl">EXEC</div>
    </div>
    <p class="text-[10px] text-gray-500 font-bold uppercase mt-6 tracking-[0.3em]">Initializing Execution Protocol</p>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
    body { font-family: 'Inter', sans-serif; background: transparent; color: #e7e5e4; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    
    /* PROGRESS AREA */
    .progress-section { width: 100%; padding: 0 24px; margin-top: 10px; }

    /* CENTER AREA */
    .content-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; width: 100%; }
    #score { font-size: 72px; font-weight: 900; color: white; line-height: 1; margin-bottom: 10px; text-shadow: 0 0 40px rgba(34, 211, 238, 0.4); }

    /* CAPYBARA */
    .capy-container { position: relative; width: 280px; pointer-events: none; }
    .float-wrapper { animation: float 4s ease-in-out infinite; display: flex; justify-content: center; }
    #capy-img { width: 100%; filter: drop-shadow(0 0 50px rgba(0,0,0,1)); transition: transform 0.08s cubic-bezier(0.2, 0.8, 0.2, 1.2); }
    .pedestal { width: 220px; height: 12px; background: #0a0a0a; border-top: 2px solid rgba(34,211,238,0.6); border-radius: 50% / 100% 100% 0 0; margin: -15px auto 0; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

    /* STATS AREA */
    .stats-container { padding: 0 16px 120px; flex-shrink: 0; width: 100%; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .card { background: rgba(10, 15, 20, 0.8); border: 1px solid rgba(34, 211, 238, 0.1); padding: 14px 8px; border-radius: 16px; text-align: center; backdrop-filter: blur(10px); }

    /* FX TAPPING */
    .plus-val { position: absolute; color: #22d3ee; font-weight: 900; font-size: 32px; pointer-events: none; animation: flyUp 0.7s ease-out forwards; z-index: 100; text-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }
    @keyframes flyUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-150px) scale(1.5); opacity: 0; } }
</style>
</head>
<body>

  <div class="progress-section">
    <div class="flex justify-between items-end mb-1 px-1">
      <div id="rank-name" class="text-[10px] font-bold text-cyan-400 uppercase tracking-tighter">Rank: Rookie</div>
      <div class="text-[10px] font-bold text-gray-500"><span id="lvl-progress">0/10000</span> | Level <span id="lvl-num">1</span></div>
    </div>
    <div class="w-full h-1.5 bg-slate-900 rounded-full border border-slate-800 overflow-hidden">
      <div id="level-bar" class="h-full bg-cyan-500 shadow-[0_0_10px_#22d3ee] transition-all duration-500" style="width: 0%"></div>
    </div>
  </div>

  <div class="content-area" id="tap-zone">
    <div id="score">0</div>
    <div class="capy-container">
      <div class="float-wrapper">
        <img id="capy-img" src="https://image.pollinations.ai/prompt/minimal_sculptural_capybara_statue_dark_brown_matte_ceramic_long_nose_calm_posture_side_profile_luxury_fintech_mascot_soft_directional_lighting_black_background_ultra_clean_silhouette_--ar_1:1" alt="Mascot" />
      </div>
      <div class="pedestal"></div>
    </div>
  </div>

  <div class="stats-container">
    <div class="stats-grid">
      <div class="card">
        <div style="font-size:9px; color:#555; font-weight:800; margin-bottom:2px;">PER TAP</div>
        <b style="font-size:16px; color:white">+1</b>
      </div>
      <div class="card">
        <div style="font-size:9px; color:#555; font-weight:800; margin-bottom:2px;">ENERGY</div>
        <b id="energy-val" style="font-size:16px; color:#22d3ee">5000</b>
      </div>
      <div class="card">
        <div style="font-size:9px; color:#555; font-weight:800; margin-bottom:2px;">HOURLY</div>
        <b style="font-size:16px; color:white">0</b>
      </div>
    </div>
  </div>

<script>
// --- GAME LOGIC ---
const ranks = ["Rookie", "Explorer", "Miner", "Sovereign", "Elite", "Prime"];
let score = parseInt(localStorage.getItem('miftah_prime_score')) || 0;
let energy = parseInt(localStorage.getItem('miftah_energy')) || 5000;
const maxEnergy = 5000;
const scoreToLevel = 10000;

function updateUI() {
    document.getElementById('score').innerText = score.toLocaleString();
    document.getElementById('energy-val').innerText = energy;
    
    let currentLvl = Math.floor(score / scoreToLevel) + 1;
    let currentProgress = score % scoreToLevel;
    let progressPercent = (currentProgress / scoreToLevel) * 100;
    
    document.getElementById('lvl-num').innerText = Math.min(currentLvl, 10);
    document.getElementById('lvl-progress').innerText = currentProgress.toLocaleString() + " / " + scoreToLevel.toLocaleString();
    document.getElementById('level-bar').style.width = progressPercent + "%";
    
    let rankIndex = Math.min(ranks.length - 1, Math.floor((currentLvl - 1) / 2));
    document.getElementById('rank-name').innerText = "Rank: " + ranks[rankIndex];
}

const handleInput = (x, y) => {
  if (energy < 1) return;
  score++;
  energy--;
  
  updateUI();
  localStorage.setItem('miftah_prime_score', score);
  localStorage.setItem('miftah_energy', energy);

  // Animasi Pencet
  const img = document.getElementById('capy-img');
  img.style.transform = 'scale(0.92)';
  setTimeout(() => { img.style.transform = 'scale(1)'; }, 80);

  // Floating Text
  const plus = document.createElement('div');
  plus.innerText = '+1';
  plus.className = 'plus-val';
  plus.style.left = `${x - 20}px`;
  plus.style.top = `${y - 40}px`;
  document.body.appendChild(plus);
  setTimeout(() => plus.remove(), 700);

  if (navigator.vibrate) navigator.vibrate(10);
};

// Auto Regen Energy
setInterval(() => {
  if (energy < maxEnergy) {
    energy++;
    updateUI();
    localStorage.setItem('miftah_energy', energy);
  }
}, 1000);

// Event Listeners
const zone = document.getElementById('tap-zone');
zone.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    handleInput(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
  }
}, { passive: false });

updateUI();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>Wealth OS — Miftah Prime</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Inter',sans-serif;
  overflow:hidden;
  user-select:none;
  color:#e7e5e4;
  background:#05070a;
}

/* GRID */
body::after {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(34,211,238,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,211,238,0.03) 1px, transparent 1px);
  background-size:30px 30px;
  z-index:-1;
}

/* ORB */
.main-orb{
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(34,211,238,.08), transparent 70%);
  filter:blur(80px);
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:0;
}

/* RING */
.stoic-ring{
  position:absolute;
  inset:50%;
  width:450px;
  height:450px;
  transform:translate(-50%,-50%);
  border:1px solid rgba(103,232,249,.1);
  border-radius:60px;
  animation:ringRotate 30s linear infinite;
  z-index:1;
}

@keyframes ringRotate{
  from{transform:translate(-50%,-50%) rotate(0deg);}
  to{transform:translate(-50%,-50%) rotate(360deg);}
}

/* GLASS */
.glass{
  background:rgba(10,15,20,.75);
  border:1px solid rgba(34,211,238,.12);
  backdrop-filter:blur(15px);
}

/* SCORE */
#score{
  color:white;
  text-shadow:0 0 25px rgba(34,211,238,.4);
}

/* CENTER WRAP */
.center-wrap{
  position:relative;
  z-index:20;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:55vh;
}

/* CAPY BACKGROUND (reduced role) */
#capy-layer{
  position:absolute;
  width:320px;
  opacity:0.45;
  filter:blur(0.2px) drop-shadow(0 0 15px rgba(0,0,0,.8));
  animation:float 5s ease-in-out infinite;
  z-index:2;
  pointer-events:none;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* TAP AREA */
#tap-container{
  position:relative;
  z-index:10;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* STATS */
.stat{
  opacity:0.7;
}

/* FLOAT TEXT */
.tap-inc{
  position:absolute;
  color:#22d3ee;
  font-weight:800;
  font-size:22px;
  pointer-events:none;
}

/* FOOTER */
.footer-blur{
  background:rgba(5,7,10,.92);
  border-top:1px solid rgba(34,211,238,.08);
}
.nav-icon{color:#3f3f46;}
.nav-icon.active{color:#22d3ee;}
</style>
</head>

<body class="h-screen flex flex-col">

<div class="main-orb"></div>
<div class="stoic-ring"></div>

<!-- HEADER -->
<header class="relative z-50 p-6 flex justify-between items-center">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 bg-zinc-900 border border-cyan-500/30 flex items-center justify-center">
      <span class="text-cyan-400 font-black">M</span>
    </div>
    <div>
      <p class="text-[8px] tracking-[0.4em] text-cyan-500/40">SECURITY PRIME</p>
      <p class="text-xs font-bold">Miftah OS</p>
    </div>
  </div>

  <div class="glass px-3 py-1 rounded-lg flex items-center gap-2">
    <div class="w-2 h-2 bg-cyan-400 rounded-full animate-pulse"></div>
    <span class="text-[9px] text-cyan-300">ENCRYPTED</span>
  </div>
</header>

<!-- MAIN DASHBOARD -->
<main class="relative flex-1 flex items-center justify-center">

  <!-- BACKGROUND CAPY -->
  <img id="capy-layer"
       src="https://image.pollinations.ai/prompt/ultra_realistic_capybara_cyber_dark_cyan_rim_light"
       class="absolute" />

  <div class="center-wrap">

    <!-- SCORE -->
    <p class="text-[10px] tracking-[0.6em] text-zinc-500 mb-2">
      RESOURCE VALUE
    </p>

    <div class="flex items-end gap-2 mb-6">
      <h1 id="score" class="text-7xl font-black">0</h1>
      <span class="text-cyan-400 text-lg font-bold">.00</span>
    </div>

    <!-- PROGRESS -->
    <div class="w-64 h-1 bg-zinc-900 rounded-full overflow-hidden border border-white/5 mb-10">
      <div id="progress-bar" class="h-full bg-cyan-500" style="width:40%"></div>
    </div>

    <!-- TAP AREA -->
    <div id="tap-container" class="w-full h-64"></div>

  </div>
</main>

<!-- STATS -->
<section class="relative z-40 px-6 grid grid-cols-3 gap-3 mb-24">
  <div class="glass p-3 rounded-xl stat">
    <p class="text-[8px] text-zinc-500">HASH</p>
    <p class="text-sm">+1.0</p>
  </div>

  <div class="glass p-3 rounded-xl border border-cyan-500/20">
    <p class="text-[8px] text-cyan-400">INDEX</p>
    <p class="text-sm text-cyan-300 font-bold">7.5M</p>
  </div>

  <div class="glass p-3 rounded-xl stat">
    <p class="text-[8px] text-zinc-500">UPTIME</p>
    <p class="text-sm">99.9%</p>
  </div>
</section>

<!-- FOOTER -->
<footer class="fixed bottom-0 left-0 right-0 h-20 footer-blur flex items-center justify-around px-10 z-50">

  <i data-lucide="database" class="nav-icon w-5 h-5"></i>
  <i data-lucide="activity" class="nav-icon w-5 h-5"></i>

  <div class="absolute -top-6 left-1/2 -translate-x-1/2">
    <div class="w-14 h-14 bg-zinc-950 border border-cyan-500/40 rotate-45 flex items-center justify-center">
      <div class="-rotate-45 text-[9px] text-cyan-400 font-bold">EXEC</div>
    </div>
  </div>

  <i data-lucide="shield" class="nav-icon active w-5 h-5"></i>
  <i data-lucide="cpu" class="nav-icon w-5 h-5"></i>

</footer>

<script>
lucide.createIcons();

let score = 0;
const scoreEl = document.getElementById("score");
const progress = document.getElementById("progress-bar");
const tap = document.getElementById("tap-container");

tap.addEventListener("pointerdown", (e) => {
  score++;
  scoreEl.innerText = score.toLocaleString();

  progress.style.width = Math.min(100, 40 + score * 0.1) + "%";

  const fx = document.createElement("div");
  fx.className = "tap-inc";
  fx.innerText = "+1";
  fx.style.left = e.clientX + "px";
  fx.style.top = e.clientY + "px";
  document.body.appendChild(fx);

  fx.animate([
    { transform:"translateY(0)", opacity:1 },
    { transform:"translateY(-100px)", opacity:0 }
  ], { duration:600 });

  setTimeout(()=>fx.remove(),600);
});
</script>

</body>
</html>

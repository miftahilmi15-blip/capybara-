<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>Wealth OS — Miftah Prime</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Inter',sans-serif;
  overflow:hidden;
  touch-action:none;
  user-select:none;
  color:#e7e5e4;
  background:#05070a;
  padding-bottom:20px;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(34,211,238,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,211,238,0.03) 1px, transparent 1px);
  background-size:30px 30px;
  z-index:-1;
}

.glass{
  background:rgba(10,15,20,.8);
  border:1px solid rgba(34,211,238,.15);
  backdrop-filter:blur(15px);
  box-shadow:0 15px 35px rgba(0,0,0,.8);
}

.footer-blur{
  background:rgba(5,7,10,.92);
  border-top:1px solid rgba(34,211,238,.12);
  height:96px;
}

/* NAV ICON */
.nav-icon{
  color:#3f3f46;
  transition:.25s;
}
.nav-icon.active{
  color:#22d3ee;
  filter:drop-shadow(0 0 8px #22d3ee);
}

/* EXEC BUTTON */
.exec-btn{
  position:absolute;
  left:50%;
  transform:translateX(-50%) rotate(45deg);
  width:64px;
  height:64px;
  background:#0a0a0a;
  border:1px solid rgba(34,211,238,.4);
  box-shadow:0 0 25px rgba(34,211,238,.15);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.2s;
}
.exec-btn:active{
  transform:translateX(-50%) rotate(45deg) scale(.92);
}
.exec-text{
  transform:rotate(-45deg);
  font-size:9px;
  font-weight:900;
  color:#22d3ee;
  letter-spacing:.08em;
}
</style>
</head>

<body class="h-screen flex flex-col">

<!-- HEADER -->
<header class="relative z-50 p-6 flex justify-between items-center">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 bg-zinc-900 border border-cyan-500/30 flex items-center justify-center">
      <span class="text-cyan-400 font-black text-sm">M</span>
    </div>
    <div>
      <p class="text-[8px] uppercase tracking-[.4em] text-cyan-500/50 font-bold">Security Level: Prime</p>
      <p class="text-xs text-white font-bold">Miftah_Prime_OS</p>
    </div>
  </div>

  <div class="glass px-4 py-2 rounded-lg flex items-center gap-2">
    <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></div>
    <span class="text-[9px] uppercase text-cyan-300 font-bold">Encrypted</span>
  </div>
</header>

<!-- FOOTER -->
<footer class="fixed bottom-0 left-0 right-0 footer-blur flex items-center justify-between px-12 pb-6 z-50 relative">

  <!-- LEFT -->
  <div class="flex gap-16 items-center">
    <i data-lucide="database" class="nav-icon w-5 h-5 cursor-pointer"
       onclick="location.href='nodes.html'"></i>

    <i data-lucide="activity" class="nav-icon w-5 h-5 cursor-pointer"
       onclick="location.href='stats.html'"></i>
  </div>

  <!-- CENTER EXEC -->
  <div class="exec-btn" onclick="location.href='exec.html'">
    <div class="exec-text">EXEC</div>
  </div>

  <!-- RIGHT -->
  <div class="flex gap-16 items-center">
    <i data-lucide="shield" class="nav-icon active w-5 h-5 cursor-pointer"
       onclick="location.href='security.html'"></i>

    <i data-lucide="cpu" class="nav-icon w-5 h-5 cursor-pointer"
       onclick="location.href='terminal.html'"></i>
  </div>

</footer>

<script>
lucide.createIcons();
</script>

</body>
</html>

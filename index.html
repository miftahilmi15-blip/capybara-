<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CapyTap Pro - Realistic Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            touch-action: manipulation; 
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
        }
        
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* Animasi karakter saat di-tap */
        .char-hit {
            animation: hit 0.1s ease-out;
        }

        @keyframes hit {
            0% { transform: scale(1) brightness(1); }
            50% { transform: scale(0.95) brightness(1.2); }
            100% { transform: scale(1) brightness(1); }
        }

        /* Angka melayang (+1) */
        .floating-reward {
            position: absolute;
            animation: rise 0.7s ease-out forwards;
            pointer-events: none;
            font-weight: 900;
            font-size: 1.5rem;
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.8);
        }

        @keyframes rise {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-120px) scale(1); }
        }

        /* Efek cahaya di belakang karakter */
        .aura {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(251,191,36,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="text-white overflow-hidden h-screen flex flex-col items-center">

    <div class="w-full p-5 flex justify-between items-center z-30">
        <div class="flex items-center gap-3 glass-card py-2 px-4 rounded-2xl">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-yellow-600 to-yellow-300"></div>
            <span class="text-sm font-semibold tracking-wide">Miftah_Dev</span>
        </div>
        <div class="text-xs font-bold text-yellow-500 flex items-center gap-2 bg-yellow-500/10 py-2 px-4 rounded-2xl border border-yellow-500/20">
            <div class="w-2 h-2 bg-yellow-500 rounded-full animate-ping"></div>
            SOLANA MAINNET
        </div>
    </div>

    <div class="mt-6 text-center z-30">
        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Current Balance</p>
        <div class="flex items-center justify-center gap-3">
            <img src="https://img.icons8.com/emoji/96/gold-coin.png" class="w-12 h-12 drop-shadow-[0_0_15px_rgba(251,191,36,0.5)]" alt="coin">
            <h1 id="score-text" class="text-6xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-slate-400">0</h1>
        </div>
    </div>

    <div class="relative flex-grow flex items-center justify-center w-full z-10">
        <div class="aura"></div>
        
        <div id="tap-target" class="relative cursor-pointer transition-all duration-75 active:scale-95">
            <img id="capy-render" 
                 src="https://image.pollinations.ai/prompt/Highly_detailed_realistic_3D_render_of_a_majestic_capybara_sitting_on_a_mossy_stone_pedestal,_cinematic_lighting,_soft_fur_texture,_wearing_a_tactical_harness_with_gold_accents,_dark_ambient_background,_8k_resolution_--ar_1:1" 
                 class="w-72 h-72 md:w-96 md:h-96 object-contain drop-shadow-[0_0_60px_rgba(0,0,0,0.8)]"
                 alt="The Real Capy">
        </div>
    </div>

    <div class="w-full max-w-md px-6 pb-28 z-30">
        <div class="glass-card rounded-3xl p-5 mb-6">
            <div class="flex justify-between items-end mb-3">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Energy Reserve</p>
                    <div class="flex items-center gap-2">
                        <span class="text-xl">⚡</span>
                        <span class="text-xl font-black text-yellow-400"><span id="energy-val">1000</span><span class="text-slate-600 text-sm">/1000</span></span>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Recovery</p>
                    <p class="text-xs font-bold text-green-400">+1/sec</p>
                </div>
            </div>
            <div class="w-full h-4 bg-black/40 rounded-full p-1 border border-white/5">
                <div id="energy-bar" class="h-full bg-gradient-to-r from-yellow-600 via-yellow-400 to-yellow-200 rounded-full transition-all duration-300"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-4 rounded-2xl border-l-4 border-yellow-500">
                <p class="text-[9px] font-bold text-slate-400 uppercase">Profit per Tap</p>
                <p class="text-lg font-black text-yellow-500">+1.50</p>
            </div>
            <div class="glass-card p-4 rounded-2xl border-l-4 border-blue-500">
                <p class="text-[9px] font-bold text-slate-400 uppercase">Passive Income</p>
                <p class="text-lg font-black text-blue-400">2.4k/hr</p>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 h-20 glass-card rounded-[2.5rem] flex items-center justify-around px-4 z-40 border-t border-white/20">
        <button class="flex flex-col items-center gap-1 text-yellow-500">
            <span class="text-2xl">🎮</span>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Play</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-500">
            <span class="text-2xl">🚀</span>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Boost</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-500">
            <span class="text-2xl">🏆</span>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Rank</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-500">
            <span class="text-2xl">💰</span>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Earn</span>
        </button>
    </nav>

    <script>
        const scoreText = document.getElementById('score-text');
        const energyVal = document.getElementById('energy-val');
        const energyBar = document.getElementById('energy-bar');
        const capyImage = document.getElementById('capy-render');
        const tapTarget = document.getElementById('tap-target');

        let score = parseFloat(localStorage.getItem('realCapyScore')) || 0;
        let energy = 1000;
        const maxEnergy = 1000;

        function refreshUI() {
            scoreText.innerText = Math.floor(score).toLocaleString();
            energyVal.innerText = energy;
            energyBar.style.width = `${(energy / maxEnergy) * 100}%`;
        }

        tapTarget.addEventListener('touchstart', (e) => {
            // Biar ga zoom pas double tap
            e.preventDefault();
            
            if (energy > 0) {
                handleTap(e.touches[0].clientX, e.touches[0].clientY);
            }
        });

        // Buat testing di PC
        tapTarget.addEventListener('mousedown', (e) => {
            if (energy > 0) handleTap(e.clientX, e.clientY);
        });

        function handleTap(x, y) {
            score += 1.5;
            energy -= 1;
            
            localStorage.setItem('realCapyScore', score);
            refreshUI();

            // Animasi Hit
            capyImage.classList.remove('char-hit');
            void capyImage.offsetWidth; 
            capyImage.classList.add('char-hit');

            // Spawn floating text
            createFloatingText(x, y);
        }

        function createFloatingText(x, y) {
            const el = document.createElement('div');
            el.className = 'floating-reward';
            el.innerText = '+1.5';
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 700);
        }

        // Regen Energi
        setInterval(() => {
            if (energy < maxEnergy) {
                energy++;
                refreshUI();
            }
        }, 1000);

        refreshUI();
    </script>
</body>
</html>

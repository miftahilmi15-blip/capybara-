<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>Wealth OS — Blank Canvas</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Inter',sans-serif;
  overflow:hidden;
  touch-action:none;
  user-select:none;
  color:#e7e5e4;
  background: radial-gradient(circle at top,#0b1117 0%,#030303 50%,#000 100%);
}

/* subtle grain */
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.02;
  background-image: radial-gradient(rgba(255,255,255,.6) 1px, transparent 1px);
  background-size:4px 4px;
  z-index:999;
}

/* cinematic cyan aura */
.main-orb{
  position:absolute;
  width:520px;
  height:520px;
  border-radius:999px;
  background: radial-gradient(circle, rgba(34,211,238,.12), transparent 70%);
  filter:blur(60px);
  left:50%;
  top:48%;
  transform:translate(-50%,-50%);
  z-index:0;
}

/* floating particles */
.particles{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:1;
}

.particle{
  position:absolute;
  width:2px;
  height:2px;
  border-radius:999px;
  background:#67e8f9;
  opacity:.5;
  animation:floatParticle linear infinite;
}

@keyframes floatParticle{
  from{ transform:translateY(0px); opacity:0; }
  30%{ opacity:.6; }
  to{ transform:translateY(-120px); opacity:0; }
}

/* stoic rings */
.stoic-ring{
  position:absolute;
  inset:50%;
  width:430px;
  height:430px;
  transform:translate(-50%,-50%);
  border-radius:999px;
  border:1px solid rgba(103,232,249,.08);
  z-index:1;
  animation:ringRotate 20s linear infinite;
}

.stoic-ring::before{
  content:'';
  position:absolute;
  inset:18px;
  border-radius:999px;
  border:1px solid rgba(103,232,249,.04);
}

@keyframes ringRotate{
  from{ transform:translate(-50%,-50%) rotate(0deg); }
  to{ transform:translate(-50%,-50%) rotate(360deg); }
}

/* Container utama untuk lu isi */
#main-viewport {
  position: relative;
  z-index: 50;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

</style>
</head>

<body>

<div class="main-orb"></div>
<div class="stoic-ring"></div>
<div class="particles" id="particles"></div>

<main id="main-viewport">
    
    </main>

<script>
lucide.createIcons();

/* logic partikel tetap jalan biar background hidup */
const particles = document.getElementById('particles');
for(let i = 0; i < 28; i++){
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.top = 50 + Math.random() * 40 + '%';
  p.style.animationDuration = 6 + Math.random() * 8 + 's';
  p.style.animationDelay = Math.random() * 5 + 's';
  particles.appendChild(p);
}

/* parallax effect tetap aktif di background */
document.addEventListener('pointermove', (e)=>{
  const x = (window.innerWidth / 2 - e.clientX) / 80;
  const y = (window.innerHeight / 2 - e.clientY) / 80;
  const ring = document.querySelector('.stoic-ring');
  if(ring) ring.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
});

</script>

</body>
</html>

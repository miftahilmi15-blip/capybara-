<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoCapy - Premium Minimalist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #050505; 
            color: #fff; 
            touch-action: none; 
            overflow: hidden;
            user-select: none;
        }

        /* ===== 1. CLEAN PARALLAX WRAPPER ===== */
        #parallax-wrap {
            will-change: transform;
            transition: transform .18s ease-out;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        /* ===== 2. CHARACTER & SHADOW CLEANUP ===== */
        #capy-img {
            transform-origin: center;
            filter: contrast(1.05) saturate(1.05) brightness(1.02);
            image-rendering: auto;
            transition: filter 0.3s ease;
        }

        @keyframes floaty {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: floaty 5s ease-in-out infinite; }

        /* Subtle Glow Pas Tap */
        #tap-container:active #capy-img {
            filter: brightness(1.1) drop-shadow(0 0 18px rgba(251,191,36,0.18));
        }

        /* ===== 3. REFINED UI COMPONENTS ===== */
        .glass-stats { 
            background: rgba(15,15,15,0.6);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
        }

        .score-pop { animation: scorePop .2s ease-out; }
        @keyframes scorePop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
        }

        /* Single Slow Ring */
        @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spinSlow 30s linear infinite; }

        /* Refined Floating Coin (Hanya 1 Kecil) */
        .coin-mini { 
            position: absolute; 
            z-index: 30; 
            font-size: 1.2rem; 
            top: 20%; 
            right: 10px;
            opacity: 0.5;
            animation: floatCoin 5s ease-in-out infinite; 
        }
        @keyframes floatCoin { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="relative z-50 p-6 flex justify-between items-center">
        <div class="flex items-center gap-3 glass-stats py-2 px-4 rounded-2xl">
            <div class="w-9 h-9 rounded-xl bg-zinc-900 flex items-center justify-center border border-white/5 font-bold text-yellow-600">M</div>
            <div>
                <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-[0.1em] mb-0.5">Newbie</p>
                <p class="text-sm font-extrabold tracking-tight">Miftah_Dev</p>
            </div>
        </div>
        <button class="glass-stats w-10 h-10 rounded-xl flex items-center justify-center active:scale-90 transition-transform">⚙️</button>
    </header>

    <div class="relative z-50 text-center mt-2 mb-4">
        <div class="flex items-center justify-center gap-2">
            <img src="https://img.icons8.com/emoji/96/gold-coin.png" class="w-8 h-8 opacity-90" alt="coin">
            <h1 id="score" class="text-5xl font-extrabold tracking-tighter text-white">0</h1>
        </div>
        <div class="mt-4 px-16">
            <div class="h-1 bg-zinc-900/50 rounded-full border border-white/5 overflow-hidden">
                <div id="progress-bar" class="h-full bg-yellow-600/80 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <main class="relative flex-grow flex items-center justify-center z-10 overflow-hidden">
        <div class="absolute w-[400px] h-[400px] rounded-full bg-yellow-500/5 blur-[100px]"></div>
        <div class="absolute w-[360px] h-[360px] rounded-full border border-yellow-500/10 animate-spin-slow"></div>

        <div id="tap-container" class="relative transition-transform duration-200 active:scale-95 cursor-pointer">
            
            <div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-48 h-10 bg-black/50 blur-2xl rounded-full"></div>
            
            <div id="parallax-wrap">
                <img id="capy-img"
                    src="https://image.pollinations.ai/prompt/pixar_style_capybara_character_simple_clean_shapes_front_view_centered_pose_two_legs_visible_high_quality_3D_mobile_game_mascot_black_background_--ar_1:1"
                    class="relative z-10 w-72 h-72 md:w-[24rem] md:h-[24rem] object-contain animate-float select-none pointer-events-none"
                    alt="CryptoCapy">
            </div>

            <div class="coin-mini">🪙</div>

            <div class="absolute top-10 right-0 z-20 px-3 py-1 rounded-full bg-yellow-500/5 border border-yellow-500/10 backdrop-blur-md">
                <p class="text-[9px] font-black tracking-widest text-yellow-600/80 uppercase">Legendary</p>
            </div>
        </div>
    </main>

    <div class="relative z-50 px-8 grid grid-cols-3 gap-3 -translate-y-4">
        <div class="glass-stats p-3 rounded-2xl flex flex-col items-center">
            <span class="text-[8px] font-bold text-zinc-500 uppercase mb-0.5 tracking-tight">Tap</span>
            <span class="text-xs font-bold text-yellow-600">+1</span>
        </div>
        <div class="glass-stats p-3 rounded-2xl flex flex-col items-center bg-zinc-900/40 border-yellow-500/10">
            <span class="text-[8px] font-bold text-zinc-500 uppercase mb-0.5 tracking-tight">Hour</span>
            <span class="text-xs font-bold text-white">0</span>
        </div>
        <div class="glass-stats p-3 rounded-2xl flex flex-col items-center">
            <span class="text-[8px] font-bold text-zinc-500 uppercase mb-0.5 tracking-tight">Energy</span>
            <span class="text-xs font-bold">50</span>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 h-24 backdrop-blur-2xl bg-black/80 border-t border-white/5 flex items-center justify-around px-8 pb-3 z-50">
        <div class="flex gap-10 opacity-30">
            <div class="flex flex-col items-center gap-1"><span class="text-xl">💎</span><p class="text-[7px] font-bold uppercase">Staking</p></div>
            <div class="flex flex-col items-center gap-1"><span class="text-xl">📋</span><p class="text-[7px] font-bold uppercase">Tasks</p></div>
        </div>

        <div class="absolute -top-8 left-1/2 -translate-x-1/2">
            <div class="w-20 h-20 bg-zinc-950 rounded-full p-1 border border-yellow-500/20 active:scale-95 transition-transform shadow-2xl">
                <div class="w-full h-full rounded-full flex flex-col items-center justify-center bg-zinc-900/50">
                    <p class="text-[8px] font-bold text-yellow-600 leading-none">FARM</p>
                    <p class="text-sm font-black mt-0.5">0.00</p>
                </div>
            </div>
        </div>

        <div class="flex gap-10 opacity-30">
            <div class="flex flex-col items-center gap-1"><span class="text-xl">👥</span><p class="text-[7px] font-bold uppercase">Friends</p></div>
            <div class="flex flex-col items-center gap-1"><span class="text-xl">🐭</span><p class="text-[7px] font-bold uppercase">Games</p></div>
        </div>
    </footer>

    <script>
        const scoreEl = document.getElementById('score');
        const tapContainer = document.getElementById('tap-container');
        const parallaxWrap = document.getElementById('parallax-wrap');
        let currentScore = 0;

        // Parallax: Slower & Smoother
        document.addEventListener('pointermove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 60;
            const y = (window.innerHeight / 2 - e.clientY) / 60;
            parallaxWrap.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Shockwave: Clean & Minimal
        function createShockwave(x, y) {
            const ring = document.createElement('div');
            ring.className = 'fixed w-6 h-6 rounded-full border border-yellow-600/30 pointer-events-none z-50';
            ring.style.left = `${x - 12}px`; ring.style.top = `${y - 12}px`;
            document.body.appendChild(ring);
            ring.animate([{ transform: 'scale(.8)', opacity: 1 }, { transform: 'scale(4)', opacity: 0 }], { duration: 500 });
            setTimeout(() => ring.remove(), 500);
        }

        // Tap Text
        function createTapEffect(x, y, text = '+1') {
            const plus = document.createElement('div');
            plus.innerText = text;
            plus.className = 'fixed pointer-events-none text-xl font-extrabold text-yellow-600 z-[60]';
            plus.style.left = `${x}px`; plus.style.top = `${y}px`;
            document.body.appendChild(plus);
            plus.animate([
                { opacity: 1, transform: 'translateY(0px)' },
                { opacity: 0, transform: 'translateY(-120px)' }
            ], { duration: 800, easing: 'ease-out' });
            setTimeout(() => plus.remove(), 800);
        }

        tapContainer.addEventListener('pointerdown', (e) => {
            currentScore += 1;
            scoreEl.innerText = Math.floor(currentScore).toLocaleString();
            
            scoreEl.classList.remove('score-pop');
            void scoreEl.offsetWidth;
            scoreEl.classList.add('score-pop');

            createTapEffect(e.clientX, e.clientY);
            createShockwave(e.clientX, e.clientY);
        });
    </script>
</body>
</html>

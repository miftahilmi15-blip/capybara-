<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Wealth OS — Miftah Prime</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
body {
  font-family: 'Inter', sans-serif; overflow: hidden; user-select: none;
  background: #05070a; color: #e7e5e4; height: 100vh; display: flex; flex-direction: column;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background: linear-gradient(rgba(34,211,238,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(34,211,238,0.03) 1px, transparent 1px);
  background-size: 30px 30px; z-index: -1;
}

/* HEADER - Updated for Alignment */
.header { padding: 20px 24px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

/* PROGRESS AREA */
.progress-section { width: 100%; padding: 0 24px; margin-bottom: 5px; }

/* CENTER AREA */
.content-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; width: 100%; }
#score { font-size: 72px; font-weight: 900; color: white; line-height: 1; margin-bottom: 10px; text-shadow: 0 0 40px rgba(34, 211, 238, 0.4); }

/* CAPYBARA */
.capy-container { position: relative; width: 300px; pointer-events: none; }
.float-wrapper { animation: float 4s ease-in-out infinite; display: flex; justify-content: center; }
#capy-img { width: 100%; filter: drop-shadow(0 0 50px rgba(0,0,0,1)); transition: transform 0.08s cubic-bezier(0.2, 0.8, 0.2, 1.2); }
.pedestal { width: 240px; height: 15px; background: #0a0a0a; border-top: 2px solid rgba(34,211,238,0.6); border-radius: 50% / 100% 100% 0 0; margin: -20px auto 0; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

/* FLOATING TEXT */
.plus-val { position: absolute; color: #22d3ee; font-weight: 900; font-size: 32px; pointer-events: none; animation: flyUp 0.7s ease-out forwards; z-index: 100; text-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }
@keyframes flyUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-150px) scale(1.5); opacity: 0; } }

/* MODAL SYSTEM */
#info-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
  display: none; z-index: 2000; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
}
.modal-box { background: #0a0f14; border: 1px solid #22d3ee; padding: 24px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; }

/* STATS AREA */
.stats-container { padding: 0 16px 160px; flex-shrink: 0; width: 100%; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.card { background: rgba(10, 15, 20, 0.9); border: 1px solid rgba(34, 211, 238, 0.2); padding: 14px 8px; border-radius: 16px; text-align: center; backdrop-filter: blur(12px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

/* FOOTER */
.footer { position: fixed; bottom: 0; left: 0; right: 0; height: 95px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; background: rgba(5, 7, 10, 0.98); border-top: 1px solid rgba(34, 211, 238, 0.2); z-index: 1000; }
.nav-group { display: flex; gap: 50px; }
.nav-item { color: #3f3f46; cursor: pointer; transition: 0.3s; }
.nav-item.active { color: #22d3ee; filter: drop-shadow(0 0 8px #22d3ee); }
.exec-btn { position: absolute; left: 50%; bottom: 45px; transform: translateX(-50%) rotate(45deg); width: 65px; height: 65px; background: #05070a; border: 2px solid #22d3ee; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 25px rgba(34, 211, 238, 0.4); cursor: pointer; }
.exec-inner { transform: rotate(-45deg); font-size: 11px; font-weight: 900; color: #22d3ee; letter-spacing: 1px; }
</style>
</head>

<body>

  <div class="header">
    <div style="font-weight:900;color:#22d3ee;font-size:24px;background:rgba(34,211,238,0.1);width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:10px;border:1px solid rgba(34,211,238,0.3);">M</div>
    <div id="user-name" style="font-size:14px;color:white;font-weight:700;letter-spacing:0.5px">Miftah_Prime_OS</div>
  </div>

  <div class="progress-section">
    <div class="flex justify-between items-end mb-1 px-1">
      <div id="rank-name" class="text-[10px] font-bold text-cyan-400 uppercase tracking-tighter">Rank: Rookie</div>
      <div class="text-[10px] font-bold text-gray-500"><span id="lvl-progress">0/10000</span> | Level <span id="lvl-num">1</span></div>
    </div>
    <div class="w-full h-1.5 bg-slate-900 rounded-full border border-slate-800 overflow-hidden">
      <div id="level-bar" class="h-full bg-cyan-500 shadow-[0_0_10px_#22d3ee] transition-all duration-500" style="width: 0%"></div>
    </div>
  </div>

  <div class="content-area" id="tap-zone">
    <div id="score">0</div>
    <div class="capy-container">
      <div class="float-wrapper">
        <img id="capy-img" src="https://image.pollinations.ai/prompt/ultra_realistic_front_view_capybara_brown_fur_dark_background_cyan_rim_light_standing_on_black_stone_pedestal_stoic_cinematic_mood_high_detail_clean_background_full_body_centered_no_crop_--ar_1:1" alt="Core" />
      </div>
      <div class="pedestal"></div>
    </div>
  </div>

  <div class="stats-container">
    <div class="stats-grid">
      <div class="card">
        <div style="font-size:10px; color:#555; font-weight:800; margin-bottom:2px;">PER TAP</div>
        <b id="tap-val" style="font-size:16px; color:white">+1</b>
      </div>
      <div class="card">
        <div style="font-size:10px; color:#555; font-weight:800; margin-bottom:2px;">ENERGY</div>
        <b id="energy-val" style="font-size:16px; color:#22d3ee">0</b>
      </div>
      <div class="card">
        <div style="font-size:10px; color:#555; font-weight:800; margin-bottom:2px;">HOURLY</div>
        <b style="font-size:16px; color:white">0</b>
      </div>
    </div>
  </div>

  <div id="info-modal" onclick="this.style.display='none'">
    <div class="modal-box">
      <h3 id="modal-title" class="text-cyan-400 font-black mb-2">PROTOCOL</h3>
      <p id="modal-text" class="text-xs text-white/60">Interface initialized.</p>
    </div>
  </div>

  <div class="footer">
    <div class="nav-group">
      <div class="nav-item" onclick="switchTab(this, 'Database Hub', 'Accessing secure student data and agricultural logs.')"><i data-lucide="database"></i></div>
      <div class="nav-item" onclick="switchTab(this, 'Activity Stream', 'Monitoring real-time trading and mining operations.')"><i data-lucide="activity"></i></div>
    </div>
    <div class="exec-btn" onclick="switchTab(this, 'Prime Execution', 'Running high-level automation protocols...')"><div class="exec-inner">EXEC</div></div>
    <div class="nav-group">
      <div class="nav-item active" onclick="switchTab(this, 'Security Shield', 'Encryption active. Your assets are protected.')"><i data-lucide="shield"></i></div>
      <div class="nav-item" onclick="switchTab(this, 'Core CPU', 'Optimizing ThinkPad T450 performance for bot scripts.')"><i data-lucide="cpu"></i></div>
    </div>
  </div>

<script>
lucide.createIcons();

// --- TELEGRAM INTEGRATION ---
const tg = window.Telegram.WebApp;
if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
    document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name + "_Prime";
}

// --- CONFIG & STATE ---
const ranks = ["Rookie", "Explorer", "Miner", "Sovereign", "Elite", "Prime"];
let score = parseInt(localStorage.getItem('miftah_prime_score')) || 0;
let energy = parseInt(localStorage.getItem('miftah_energy')) || 0;
const maxEnergy = 5000;
const perTap = 1;
const scoreToLevel = 10000;

const scoreDisplay = document.getElementById('score');
const energyDisplay = document.getElementById('energy-val');
const bar = document.getElementById('level-bar');
const lvlText = document.getElementById('lvl-num');
const lvlProgressText = document.getElementById('lvl-progress');
const rankText = document.getElementById('rank-name');

function updateLeveling() {
    let currentLvl = Math.floor(score / scoreToLevel) + 1;
    if (currentLvl > 10) currentLvl = 10;
    
    let currentProgress = score % scoreToLevel;
    let progressPercent = (currentProgress / scoreToLevel) * 100;
    
    lvlText.innerText = currentLvl;
    lvlProgressText.innerText = currentProgress.toLocaleString() + " / " + scoreToLevel.toLocaleString();
    bar.style.width = progressPercent + "%";
    
    let rankIndex = Math.floor((currentLvl - 1) / 2);
    rankText.innerText = "Rank: " + ranks[rankIndex];
}

function switchTab(el, title, text) {
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    if(el.classList.contains('nav-item')) el.classList.add('active');
    
    document.getElementById('modal-title').innerText = title.toUpperCase();
    document.getElementById('modal-text').innerText = text;
    document.getElementById('info-modal').style.display = 'flex';
    
    if (navigator.vibrate) navigator.vibrate(5);
}

const handleInput = (x, y) => {
  if (energy < perTap) {
    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
    return;
  }
  score += perTap;
  energy -= perTap;
  scoreDisplay.innerText = score.toLocaleString();
  energyDisplay.innerText = energy;
  updateLeveling();
  localStorage.setItem('miftah_prime_score', score);
  localStorage.setItem('miftah_energy', energy);

  const img = document.getElementById('capy-img');
  img.style.transform = 'scale(0.92)';
  setTimeout(() => { img.style.transform = 'scale(1)'; }, 80);

  const plus = document.createElement('div');
  plus.innerText = `+${perTap}`;
  plus.className = 'plus-val';
  plus.style.left = `${x - 20}px`;
  plus.style.top = `${y - 40}px`;
  document.body.appendChild(plus);
  setTimeout(() => plus.remove(), 700);
  if (navigator.vibrate) navigator.vibrate(12);
};

scoreDisplay.innerText = score.toLocaleString();
energyDisplay.innerText = energy;
updateLeveling();

setInterval(() => {
  if (energy < maxEnergy) {
    energy += 1;
    energyDisplay.innerText = energy;
    localStorage.setItem('miftah_energy', energy);
  }
}, 1000);

const zone = document.getElementById('tap-zone');
zone.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    handleInput(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
  }
}, { passive: false });

zone.addEventListener('mousedown', (e) => {
  if (window.matchMedia("(pointer: coarse)").matches) return;
  handleInput(e.clientX, e.clientY);
});
</script>

</body>
</html>

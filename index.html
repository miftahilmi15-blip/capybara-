<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Miftah Prime — Perfect Balance</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
* {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}

body {
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  user-select: none;
  background: #020617; /* Lebih gelap & dalam */
  color: #f8fafc;
  height: 100vh;
  display: flex; flex-direction: column;
}

/* Background Atmosphere */
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(circle at 50% 30%, rgba(34, 211, 238, 0.08) 0%, transparent 70%);
  z-index: -1;
}

body::after {
  content: ''; position: fixed; inset: 0;
  background: 
    linear-gradient(rgba(34,211,238,0.01) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,211,238,0.01) 1px, transparent 1px);
  background-size: 50px 50px; z-index: -2;
}

/* HEADER */
.header { padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; }

/* PROGRESS */
.progress-section { width: 100%; padding: 0 24px; margin-top: 10px; }

/* CONTENT AREA */
.content-area {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center; position: relative;
  padding-bottom: 20px;
}

#score {
  font-size: 64px; font-weight: 950; color: #fff;
  letter-spacing: -2px; transition: all 0.2s;
  text-shadow: 0 10px 30px rgba(34, 211, 238, 0.3);
}

.capy-container { position: relative; width: 330px; pointer-events: none; margin: 10px 0; }
#capy-img {
  width: 100%; filter: drop-shadow(0 0 40px rgba(34,211,238,0.15));
  transition: transform 0.1s cubic-bezier(0.1, 0.7, 0.1, 1.15);
  z-index: 10; position: relative;
}

.pedestal {
  width: 250px; height: 12px; background: #000;
  border-top: 2px solid rgba(34,211,238,0.8); border-radius: 50% / 100% 100% 0 0;
  margin: -25px auto 0; box-shadow: 0 0 50px rgba(34,211,238,0.4);
}

/* FLOATING TEXT ANIMATION */
.plus-val {
  position: absolute; color: white; font-weight: 900; font-size: 36px;
  pointer-events: none; animation: flyUpPerfect 0.85s cubic-bezier(0.2, 0.6, 0.2, 1) forwards; z-index: 100;
  text-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
@keyframes flyUpPerfect {
  0% { transform: translate(0, 0) scale(0.5); opacity: 0; }
  20% { opacity: 1; transform: translate(0, -20px) scale(1.2); }
  100% { transform: translate(var(--x-off), -180px) scale(1); opacity: 0; }
}

/* MINI STATS */
.mini-stats {
  display: flex; justify-content: center; gap: 30px; margin-top: 25px;
  background: rgba(255,255,255,0.03); padding: 10px 25px; border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.05);
}

/* STATS GRID */
.stats-container { padding: 0 24px 150px; width: 100%; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.card {
  background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255,255,255,0.05);
  padding: 18px 5px; border-radius: 18px; text-align: center; backdrop-filter: blur(20px);
  transition: transform 0.3s;
}

/* FOOTER */
.footer {
  position: fixed; bottom: 0; left: 0; right: 0; height: 100px;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 45px; background: rgba(2, 6, 23, 0.95); 
  border-top: 1px solid rgba(34, 211, 238, 0.1); backdrop-filter: blur(15px); z-index: 1000;
}

.exec-btn {
  position: absolute; left: 50%; bottom: 45px; transform: translateX(-50%) rotate(45deg);
  width: 65px; height: 65px; background: #020617; border: 2.5px solid #22d3ee;
  display: flex; justify-content: center; align-items: center; 
  box-shadow: 0 0 30px rgba(34, 211, 238, 0.2), inset 0 0 15px rgba(34, 211, 238, 0.1);
}
.exec-inner { transform: rotate(-45deg); font-size: 11px; font-weight: 900; color: #22d3ee; letter-spacing: 1px; }

.nav-item { color: #475569; transition: all 0.4s; }
.nav-item.active { color: #22d3ee; filter: drop-shadow(0 0 10px rgba(34,211,238,0.5)); }
</style>
</head>

<body>

  <div class="header">
    <div class="flex items-center gap-4">
      <div class="w-11 h-11 bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl flex items-center justify-center border border-slate-700/50 shadow-xl">
        <span class="text-cyan-400 font-black text-2xl tracking-tighter">M</span>
      </div>
      <div>
        <div class="text-[9px] text-slate-500 uppercase font-black tracking-[0.2em]">System Root</div>
        <div class="text-base font-extrabold text-slate-200 tracking-tight">Miftah_Prime</div>
      </div>
    </div>
    <div class="bg-indigo-600/90 px-5 py-2.5 rounded-2xl text-[11px] font-black uppercase tracking-wider shadow-lg shadow-indigo-500/30 border border-indigo-400/30">Upgrades</div>
  </div>

  <div class="progress-section">
    <div class="flex justify-between items-center mb-2.5 px-1">
      <div class="flex items-center gap-1.5">
        <span class="text-[12px] font-black uppercase tracking-widest text-slate-400">Rank</span>
        <span class="text-[12px] font-black text-cyan-400">Explorer</span>
      </div>
      <div class="text-[11px] font-bold text-slate-500">Tier <span class="text-white">2</span><span class="text-slate-600"> / 10</span></div>
    </div>
    <div class="w-full h-3 bg-slate-900/50 rounded-full border border-slate-800 p-[2px]">
      <div id="level-bar" class="h-full bg-gradient-to-r from-cyan-500 via-blue-500 to-indigo-500 rounded-full shadow-[0_0_15px_rgba(34,211,238,0.3)] transition-all duration-1000" style="width: 45%"></div>
    </div>
  </div>

  <div class="content-area" id="tap-zone">
    <div id="score">0</div>
    
    <div class="capy-container">
      <div class="float-wrapper" style="animation: float 5s ease-in-out infinite;">
        <img id="capy-img" 
             src="https://r.jina.ai/i/05e6081437144e839e0839e557871b87" 
             alt="Techno Capy" />
      </div>
      <div class="pedestal"></div>
    </div>

    <div class="mini-stats">
      <div class="mini-item">
        <i data-lucide="zap" class="w-4 h-4 text-yellow-400 fill-yellow-400/20"></i>
        <span id="energy-val" class="font-black">5000</span><span class="text-slate-500 text-[11px] ml-0.5">/ 5000</span>
      </div>
      <div class="h-4 w-[1px] bg-slate-800"></div>
      <div class="mini-item">
        <i data-lucide="mouse-pointer-2" class="w-4 h-4 text-cyan-400"></i>
        <span class="font-black">2 <span class="text-slate-500 font-bold text-[10px] uppercase">tap</span></span>
      </div>
    </div>
  </div>

  <div class="stats-container">
    <div class="stats-grid">
      <div class="card">
        <i data-lucide="layers" class="w-5 h-5 mx-auto mb-2 text-slate-500"></i>
        <div class="text-[9px] font-black text-slate-500 uppercase tracking-tighter">Staking</div>
      </div>
      <div class="card" style="background: rgba(34, 211, 238, 0.05); border-color: rgba(34, 211, 238, 0.2);">
        <i data-lucide="pickaxe" class="w-5 h-5 mx-auto mb-2 text-cyan-400"></i>
        <div class="text-[9px] font-black text-cyan-400 uppercase tracking-tighter">Mining</div>
      </div>
      <div class="card">
        <i data-lucide="users" class="w-5 h-5 mx-auto mb-2 text-slate-500"></i>
        <div class="text-[9px] font-black text-slate-500 uppercase tracking-tighter">Squad</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="nav-group flex gap-12">
      <div class="nav-item"><i data-lucide="wallet-minimal" class="w-6 h-6"></i></div>
      <div class="nav-item"><i data-lucide="layout-grid" class="w-6 h-6"></i></div>
    </div>
    <div class="exec-btn"><div class="exec-inner">EXEC</div></div>
    <div class="nav-group flex gap-12">
      <div class="nav-item active"><i data-lucide="component" class="w-6 h-6"></i></div>
      <div class="nav-item"><i data-lucide="bar-chart-3" class="w-6 h-6"></i></div>
    </div>
  </div>

<script>
lucide.createIcons();

let score = parseInt(localStorage.getItem('miftah_score')) || 0;
let energy = parseInt(localStorage.getItem('miftah_energy')) || 5000;
const maxEnergy = 5000;
const perTap = 2;

const scoreDisplay = document.getElementById('score');
const energyDisplay = document.getElementById('energy-val');
const capyImg = document.getElementById('capy-img');
const tapZone = document.getElementById('tap-zone');

scoreDisplay.innerText = score.toLocaleString();
energyDisplay.innerText = energy;

const handleInput = (x, y) => {
  if (energy < perTap) {
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    return;
  }

  score += perTap;
  energy -= perTap;
  
  scoreDisplay.innerText = score.toLocaleString();
  energyDisplay.innerText = energy;

  // Skor shrink effect
  scoreDisplay.style.transform = 'scale(1.1)';
  setTimeout(() => scoreDisplay.style.transform = 'scale(1)', 100);
  
  localStorage.setItem('miftah_score', score);
  localStorage.setItem('miftah_energy', energy);

  // Animasi Gambar
  capyImg.style.transform = 'scale(0.92) translateY(8px)';
  setTimeout(() => { capyImg.style.transform = 'scale(1) translateY(0)'; }, 100);

  // Floating Number with Physics
  const plus = document.createElement('div');
  const xOffset = (Math.random() - 0.5) * 60; // Geser dikit biar gak tumpuk
  plus.innerText = `+${perTap}`;
  plus.className = 'plus-val';
  plus.style.setProperty('--x-off', `${xOffset}px`);
  plus.style.left = `${x - 20}px`;
  plus.style.top = `${y - 60}px`;
  document.body.appendChild(plus);
  setTimeout(() => plus.remove(), 850);

  if (navigator.vibrate) navigator.vibrate(12);
};

// Auto Regen Energy
setInterval(() => {
  if (energy < maxEnergy) {
    energy += 1;
    energyDisplay.innerText = energy;
    localStorage.setItem('miftah_energy', energy);
  }
}, 1000);

tapZone.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    handleInput(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
  }
}, { passive: false });

tapZone.addEventListener('mousedown', (e) => {
  if (window.matchMedia("(pointer: coarse)").matches) return;
  handleInput(e.clientX, e.clientY);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Miftah Prime — Perfect Symmetry</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
* {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}

body {
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  user-select: none;
  background: #05070a;
  color: #f8fafc;
  height: 100vh;
  display: flex; flex-direction: column;
}

/* Cyber Atmosphere */
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(circle at 50% 20%, rgba(34, 211, 238, 0.05) 0%, transparent 60%);
  z-index: -1;
}

/* HEADER */
.header { padding: 24px 24px 10px; display: flex; justify-content: space-between; align-items: center; }

/* PROGRESS AREA */
.progress-section { width: 100%; padding: 0 24px; margin-bottom: 20px; }

/* CENTER AREA */
.content-area {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center; position: relative;
}

#score {
  font-size: 64px; font-weight: 950; color: white;
  text-shadow: 0 10px 40px rgba(34, 211, 238, 0.3);
  letter-spacing: -2px; margin-bottom: 10px;
}

.capy-container { position: relative; width: 330px; pointer-events: none; }
#capy-img {
  width: 100%; filter: drop-shadow(0 0 30px rgba(34,211,238,0.15));
  transition: transform 0.1s cubic-bezier(0.17, 0.67, 0.12, 1.2);
}

.pedestal {
  width: 250px; height: 10px; background: #000;
  border-top: 2px solid #22d3ee; border-radius: 50% / 100% 100% 0 0;
  margin: -30px auto 0; box-shadow: 0 15px 45px rgba(34,211,238,0.4);
}

/* FLOATING TEXT (+2) */
.plus-val {
  position: absolute; color: white; font-weight: 900; font-size: 34px;
  pointer-events: none; animation: flyUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; z-index: 100;
}
@keyframes flyUp {
  0% { transform: translate(0, 0) scale(0.6); opacity: 0; }
  20% { opacity: 1; transform: translate(0, -20px) scale(1.1); }
  100% { transform: translate(var(--x-dir), -160px) scale(1.3); opacity: 0; }
}

/* MINI STATS BAR */
.mini-stats-bar {
  display: flex; align-items: center; gap: 20px;
  background: rgba(15, 23, 42, 0.6);
  padding: 10px 24px; border-radius: 100px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  margin-top: 30px; backdrop-filter: blur(10px);
}
.stat-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.1); }

/* STATS GRID */
.stats-container { padding: 0 24px 140px; width: 100%; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.card {
  background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255, 255, 255, 0.03);
  padding: 16px 5px; border-radius: 20px; text-align: center; backdrop-filter: blur(12px);
}

/* FOOTER */
.footer {
  position: fixed; bottom: 0; left: 0; right: 0; height: 95px;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 45px; background: rgba(5, 7, 10, 0.98); 
  border-top: 1px solid rgba(34, 211, 238, 0.1); z-index: 1000;
}
.exec-btn {
  position: absolute; left: 50%; bottom: 42px; transform: translateX(-50%) rotate(45deg);
  width: 65px; height: 65px; background: #05070a; border: 2.5px solid #22d3ee;
  display: flex; justify-content: center; align-items: center; box-shadow: 0 0 25px rgba(34, 211, 238, 0.3);
}
.exec-inner { transform: rotate(-45deg); font-size: 11px; font-weight: 900; color: #22d3ee; }
</style>
</head>

<body>

  <div class="header">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 bg-slate-900 rounded-xl flex items-center justify-center border border-slate-700/50">
        <span class="text-cyan-400 font-black text-2xl">M</span>
      </div>
      <div>
        <div class="text-[9px] text-gray-500 uppercase font-bold tracking-[0.2em]">Profile</div>
        <div class="text-base font-bold tracking-tight">Miftah_Prime</div>
      </div>
    </div>
    <div class="bg-indigo-600 px-5 py-2.5 rounded-2xl text-[11px] font-black uppercase tracking-wider shadow-lg shadow-indigo-500/20">Upgrades</div>
  </div>

  <div class="progress-section">
    <div class="flex justify-between items-center mb-2 px-1">
      <div class="flex items-center gap-1.5">
        <span class="text-[11px] font-black text-slate-500 uppercase tracking-widest">Rank</span>
        <span class="text-[11px] font-black text-cyan-400 uppercase">Explorer</span>
      </div>
      <div class="text-[10px] font-bold text-slate-500">Lv <span class="text-white">2</span> / 10</div>
    </div>
    <div class="w-full h-2.5 bg-slate-900 rounded-full border border-slate-800 overflow-hidden p-[1px]">
      <div id="level-bar" class="h-full bg-gradient-to-r from-cyan-400 to-blue-600 rounded-full shadow-[0_0_10px_rgba(34,211,238,0.4)]" style="width: 45%"></div>
    </div>
  </div>

  <div class="content-area" id="tap-zone">
    <div id="score">0</div>
    
    <div class="capy-container">
      <div class="float-wrapper" style="animation: float 4s ease-in-out infinite;">
        <img id="capy-img" 
             src="https://r.jina.ai/i/05e6081437144e839e0839e557871b87" 
             alt="Techno Capy" />
      </div>
      <div class="pedestal"></div>
    </div>

    <div class="mini-stats-bar">
      <div class="flex items-center gap-2">
        <i data-lucide="zap" class="w-4 h-4 text-yellow-400 fill-yellow-400/20"></i>
        <span id="energy-val" class="text-sm font-black">5000</span>
      </div>
      <div class="stat-divider"></div>
      <div class="flex items-center gap-2">
        <i data-lucide="mouse-pointer-2" class="w-4 h-4 text-cyan-400"></i>
        <span class="text-sm font-black">2 <span class="text-[10px] text-slate-500">TAP</span></span>
      </div>
    </div>
  </div>

  <div class="stats-container">
    <div class="stats-grid">
      <div class="card">
        <i data-lucide="layers" class="w-5 h-5 mx-auto mb-2 text-slate-500"></i>
        <div class="text-[9px] font-black text-slate-500 uppercase">Staking</div>
      </div>
      <div class="card" style="background: rgba(34, 211, 238, 0.05); border-color: rgba(34, 211, 238, 0.2);">
        <i data-lucide="pickaxe" class="w-5 h-5 mx-auto mb-2 text-cyan-400"></i>
        <div class="text-[9px] font-black text-cyan-400 uppercase">Mining</div>
      </div>
      <div class="card">
        <i data-lucide="users" class="w-5 h-5 mx-auto mb-2 text-slate-500"></i>
        <div class="text-[9px] font-black text-slate-500 uppercase">Friends</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="nav-group flex gap-12">
      <div class="nav-item"><i data-lucide="wallet-2" class="w-6 h-6"></i></div>
      <div class="nav-item"><i data-lucide="layout-grid" class="w-6 h-6"></i></div>
    </div>
    <div class="exec-btn"><div class="exec-inner">EXEC</div></div>
    <div class="nav-group flex gap-12">
      <div class="nav-item active"><i data-lucide="shield-check" class="w-6 h-6"></i></div>
      <div class="nav-item"><i data-lucide="cpu" class="w-6 h-6"></i></div>
    </div>
  </div>

<script>
lucide.createIcons();

let score = parseInt(localStorage.getItem('miftah_score')) || 0;
let energy = parseInt(localStorage.getItem('miftah_energy')) || 5000;
const maxEnergy = 5000;
const perTap = 2;

const scoreDisplay = document.getElementById('score');
const energyDisplay = document.getElementById('energy-val');
const capyImg = document.getElementById('capy-img');
const tapZone = document.getElementById('tap-zone');

scoreDisplay.innerText = score.toLocaleString();
energyDisplay.innerText = energy;

const handleInput = (x, y) => {
  if (energy < perTap) {
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    return;
  }

  score += perTap;
  energy -= perTap;
  
  scoreDisplay.innerText = score.toLocaleString();
  energyDisplay.innerText = energy;
  
  localStorage.setItem('miftah_score', score);
  localStorage.setItem('miftah_energy', energy);

  // Bounce Effect
  capyImg.style.transform = 'scale(0.92) translateY(5px)';
  setTimeout(() => { capyImg.style.transform = 'scale(1) translateY(0)'; }, 100);

  // Floating Number with Physics
  const plus = document.createElement('div');
  const xDir = (Math.random() - 0.5) * 80; // Efek meluncur ke samping
  plus.innerText = `+${perTap}`;
  plus.className = 'plus-val';
  plus.style.setProperty('--x-dir', `${xDir}px`);
  plus.style.left = `${x - 20}px`;
  plus.style.top = `${y - 40}px`;
  document.body.appendChild(plus);
  setTimeout(() => plus.remove(), 800);

  if (navigator.vibrate) navigator.vibrate(12);
};

// Regen Energy
setInterval(() => {
  if (energy < maxEnergy) {
    energy += 1;
    energyDisplay.innerText = energy;
    localStorage.setItem('miftah_energy', energy);
  }
}, 1000);

// Input Listeners
tapZone.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    handleInput(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
  }
}, { passive: false });

tapZone.addEventListener('mousedown', (e) => {
  if (window.matchMedia("(pointer: coarse)").matches) return;
  handleInput(e.clientX, e.clientY);
});

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}
</style>
</head>

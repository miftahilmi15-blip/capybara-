<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Wealth OS — Miftah Prime</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
body {
  font-family: 'Inter', sans-serif; overflow: hidden; user-select: none;
  background: #05070a; color: #e7e5e4; height: 100vh; display: flex; flex-direction: column;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background: linear-gradient(rgba(34,211,238,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(34,211,238,0.03) 1px, transparent 1px);
  background-size: 30px 30px; z-index: -1;
}

/* HEADER */
.header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }

/* PROGRESS AREA */
.progress-section { width: 100%; padding: 0 24px; margin-bottom: 5px; }

/* CENTER AREA */
.content-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; width: 100%; }
#score-container { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
#score { font-size: 64px; font-weight: 900; color: white; text-shadow: 0 0 40px rgba(34, 211, 238, 0.4); }

/* CAPYBARA */
.capy-container { position: relative; width: 280px; pointer-events: none; }
.float-wrapper { animation: float 4s ease-in-out infinite; display: flex; justify-content: center; }
#capy-img { width: 100%; filter: drop-shadow(0 0 50px rgba(0,0,0,1)); transition: transform 0.08s cubic-bezier(0.2, 0.8, 0.2, 1.2); }
.pedestal { width: 240px; height: 15px; background: #0a0a0a; border-top: 2px solid rgba(34,211,238,0.6); border-radius: 50% / 100% 100% 0 0; margin: -20px auto 0; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

/* POPUP SYSTEM */
#popup-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
  display: none; z-index: 2000; flex-direction: column; justify-content: flex-end;
}
.popup-content {
  background: #0a0f14; border-top: 2px solid #22d3ee; border-radius: 30px 30px 0 0;
  padding: 30px 24px; height: 70vh; position: relative;
}

/* STATS AREA */
.stats-container { padding: 0 16px 140px; flex-shrink: 0; width: 100%; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.card { background: rgba(10, 15, 20, 0.9); border: 1px solid rgba(34, 211, 238, 0.2); padding: 14px 8px; border-radius: 16px; text-align: center; }

/* FOOTER */
.footer { position: fixed; bottom: 0; left: 0; right: 0; height: 95px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; background: rgba(5, 7, 10, 0.98); border-top: 1px solid rgba(34, 211, 238, 0.2); z-index: 1000; }
.nav-item { color: #3f3f46; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.nav-item.active { color: #22d3ee; filter: drop-shadow(0 0 8px #22d3ee); }
.exec-btn { position: absolute; left: 50%; bottom: 45px; transform: translateX(-50%) rotate(45deg); width: 65px; height: 65px; background: #05070a; border: 2px solid #22d3ee; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 25px rgba(34, 211, 238, 0.4); }
.plus-val { position: absolute; color: #22d3ee; font-weight: 900; font-size: 32px; animation: flyUp 0.7s forwards; }
@keyframes flyUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
</style>
</head>

<body>

  <div class="header">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-cyan-900/30 rounded-lg flex items-center justify-center border border-cyan-500/30 text-cyan-400 font-black">M</div>
      <div>
        <div id="user-name" class="text-white font-bold text-sm tracking-tight">Miftah Prime</div>
        <div class="text-[10px] text-cyan-500 font-black uppercase">Elite Protocol</div>
      </div>
    </div>
    <div class="bg-black/40 border border-white/5 px-3 py-1.5 rounded-full flex items-center gap-2">
      <div class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-pulse"></div>
      <span class="text-[9px] font-bold tracking-widest text-white/50">SECURED</span>
    </div>
  </div>

  <div class="progress-section">
    <div class="flex justify-between items-end mb-1.5">
      <div id="rank-name" class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">Rookie</div>
      <div class="text-[10px] font-bold text-white/40"><span id="lvl-cur">0</span> / 10.000 <span class="ml-2 text-cyan-500">Lv. <span id="lvl-num">1</span></span></div>
    </div>
    <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden border border-white/5">
      <div id="level-bar" class="h-full bg-cyan-500 shadow-[0_0_15px_rgba(34,211,238,0.6)] transition-all duration-700" style="width: 0%"></div>
    </div>
  </div>

  <div class="content-area" id="tap-zone">
    <div id="score-container">
      <img src="https://cdn-icons-png.flaticon.com/512/11516/11516848.png" class="w-10 h-10" alt="token">
      <div id="score">0</div>
    </div>
    <div class="capy-container">
      <div class="float-wrapper">
        <img id="capy-img" src="https://image.pollinations.ai/prompt/stoic_capybara_statue_dark_matte_ceramic_luxury_fintech_mascot_soft_rim_light_black_background_clean_silhouette_product_photography_--ar_1:1" alt="Core" />
      </div>
      <div class="pedestal"></div>
    </div>
  </div>

  <div class="stats-container">
    <div class="stats-grid">
      <div class="card">
        <div class="text-[9px] text-white/30 font-black uppercase mb-1">Per Tap</div>
        <div class="text-sm font-black text-white">+1</div>
      </div>
      <div class="card">
        <div class="text-[9px] text-white/30 font-black uppercase mb-1">Energy</div>
        <div id="energy-val" class="text-sm font-black text-cyan-400">0</div>
      </div>
      <div class="card">
        <div class="text-[9px] text-white/30 font-black uppercase mb-1">Mining</div>
        <div class="text-sm font-black text-white">0</div>
      </div>
    </div>
  </div>

  <div id="popup-overlay" onclick="closePopup()">
    <div class="popup-content" onclick="event.stopPropagation()">
      <div class="w-12 h-1 bg-white/10 rounded-full mx-auto mb-6"></div>
      <h2 id="popup-title" class="text-2xl font-black text-white mb-2 text-center uppercase tracking-tighter">Menu</h2>
      <p id="popup-desc" class="text-white/40 text-center text-xs mb-8">System interface active.</p>
      <div id="popup-body" class="space-y-4"></div>
    </div>
  </div>

  <div class="footer">
    <div class="flex gap-10">
      <div class="nav-item" onclick="openPopup('staking')"><i data-lucide="database"></i><span class="text-[8px] font-bold">STAKE</span></div>
      <div class="nav-item" onclick="openPopup('tasks')"><i data-lucide="list-checks"></i><span class="text-[8px] font-bold">TASKS</span></div>
    </div>
    <div class="exec-btn" onclick="openPopup('exec')"><div class="rotate-[-45deg] text-[10px] font-black text-cyan-400">EXEC</div></div>
    <div class="flex gap-10">
      <div class="nav-item active" onclick="closePopup()"><i data-lucide="shield"></i><span class="text-[8px] font-bold">HOME</span></div>
      <div class="nav-item" onclick="openPopup('miner')"><i data-lucide="cpu"></i><span class="text-[8px] font-bold">MINER</span></div>
    </div>
  </div>

<script>
lucide.createIcons();

let score = parseInt(localStorage.getItem('mp_score')) || 0;
let energy = parseInt(localStorage.getItem('mp_energy')) || 0;
const maxEnergy = 5000;
const perTap = 1;
const scoreToLevel = 10000;

function updateUI() {
    document.getElementById('score').innerText = score.toLocaleString();
    document.getElementById('energy-val').innerText = energy;
    let lvl = Math.floor(score / scoreToLevel) + 1;
    let progress = ((score % scoreToLevel) / scoreToLevel) * 100;
    document.getElementById('lvl-num').innerText = lvl;
    document.getElementById('lvl-cur').innerText = (score % scoreToLevel).toLocaleString();
    document.getElementById('level-bar').style.width = progress + "%";
}

function openPopup(type) {
    const overlay = document.getElementById('popup-overlay');
    const title = document.getElementById('popup-title');
    const body = document.getElementById('popup-body');
    overlay.style.display = 'flex';
    
    if(type === 'staking') {
        title.innerText = "Quantum Staking";
        body.innerHTML = `<div class="bg-white/5 p-4 rounded-xl border border-white/10"><div class="text-xs text-cyan-400 font-bold mb-1">APY 15%</div><div class="text-white font-bold">Lock your Prime Points</div></div>`;
    } else if(type === 'tasks') {
        title.innerText = "Daily Protocols";
        body.innerHTML = `<div class="bg-white/5 p-4 rounded-xl flex justify-between items-center"><div class="text-sm font-bold text-white">Join Telegram</div><div class="text-cyan-400 font-black">+5.000</div></div>`;
    }
}

function closePopup() { document.getElementById('popup-overlay').style.display = 'none'; }

const handleInput = (x, y) => {
  if (energy < perTap) return;
  score += perTap; energy -= perTap;
  updateUI();
  localStorage.setItem('mp_score', score);
  localStorage.setItem('mp_energy', energy);

  const img = document.getElementById('capy-img');
  img.style.transform = 'scale(0.92)';
  setTimeout(() => img.style.transform = 'scale(1)', 80);

  const plus = document.createElement('div');
  plus.innerText = `+${perTap}`;
  plus.className = 'plus-val';
  plus.style.left = `${x}px`; plus.style.top = `${y}px`;
  document.body.appendChild(plus);
  setTimeout(() => plus.remove(), 700);
};

setInterval(() => { if(energy < maxEnergy) { energy++; updateUI(); } }, 1000);

document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (let t of e.changedTouches) handleInput(t.clientX, t.clientY);
}, { passive: false });

updateUI();
</script>
</body>
</html>

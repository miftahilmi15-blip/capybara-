<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>Wealth OS — Miftah Prime</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Inter',sans-serif;
  overflow:hidden;
  user-select:none;
  background:#05070a;
  color:#e7e5e4;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(34,211,238,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,211,238,0.03) 1px, transparent 1px);
  background-size:30px 30px;
  z-index:-1;
}

/* HEADER */
.header{
  padding:24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.glass{
  background:rgba(10,15,20,.8);
  border:1px solid rgba(34,211,238,.15);
  backdrop-filter:blur(15px);
  box-shadow:0 15px 35px rgba(0,0,0,.8);
}

/* SCORE */
.score{
  text-align:center;
  margin-top:10px;
}

#score{
  font-size:64px;
  font-weight:900;
  color:white;
}

/* MAIN - REPOSISI KE ATAS */
.main{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:380px; 
  position:relative;
  margin-top: -20px; /* Tarik ke atas */
}

#capy-img-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    top: -15px; /* Fine tuning posisi kaki */
}

#capy-img{
  max-width:300px;
  filter:drop-shadow(0 0 20px black);
  animation:float 4s ease-in-out infinite;
  transition: transform 0.1s ease;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

.pedestal{
  width:260px;
  height:18px;
  background:#111;
  border-top:2px solid rgba(34,211,238,.4);
  margin-top: -15px; /* Rapatkan dengan kaki */
  border-radius: 50% / 100% 100% 0 0;
  filter: blur(1px);
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  padding:0 20px;
  margin-top: -10px; /* Rapatkan dengan area atas */
}

.card{
  background:rgba(10,15,20,.8);
  border:1px solid rgba(34,211,238,.15);
  padding:14px;
  border-radius:12px;
  text-align:center;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:90px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 40px;
  background:rgba(5,7,10,.95);
  border-top:1px solid rgba(34,211,238,.1);
}

.nav{
  display:flex;
  gap:70px;
}

.nav i{
  cursor:pointer;
  color:#3f3f46;
}

.nav i.active{
  color:#22d3ee;
  filter:drop-shadow(0 0 8px #22d3ee);
}

/* EXEC */
.exec{
  position:absolute;
  left:50%;
  transform:translateX(-50%) rotate(45deg);
  width:64px;
  height:64px;
  background:#0a0a0a;
  border:1px solid rgba(34,211,238,.4);
  display:flex;
  justify-content:center;
  align-items:center;
  cursor: pointer;
}

.exec div{
  transform:rotate(-45deg);
  font-size:10px;
  font-weight:900;
  color:#22d3ee;
}
</style>
</head>

<body>

<div class="header">
  <div>
    <div style="font-weight:900;color:#22d3ee;font-size:18px">M</div>
    <div style="font-size:10px;color:#888;text-transform:uppercase">Security Level: Prime</div>
    <div style="font-size:12px;color:white;font-weight:700">Miftah_Prime_OS</div>
  </div>

  <div class="glass" style="padding:8px 14px;border-radius:10px;font-size:12px">
    <span style="color:#22d3ee">●</span> ENCRYPTED
  </div>
</div>

<div class="score">
  <div style="font-size:10px;color:#888;letter-spacing:4px;text-transform:uppercase">Resource Allocation</div>
  <div id="score">0</div>
</div>

<div class="main" id="tap-target">
  <div id="capy-img-container">
    <img id="capy-img"
      src="https://image.pollinations.ai/prompt/ultra_realistic_front_view_capybara_brown_fur_dark_background_cyan_rim_light_standing_on_black_stone_pedestal_stoic_cinematic_mood_high_detail_clean_background_full_body_centered_no_crop_--ar_1:1"
      alt="core" />
    <div class="pedestal"></div>
  </div>
</div>

<div class="stats">
  <div class="card">
    <span style="font-size:10px;color:#888">Hash Rate</span><br><b>+1.0</b>
  </div>

  <div class="card">
    <span style="font-size:10px;color:#888">Index PPh</span><br><b style="color:#22d3ee">7.5M</b>
  </div>

  <div class="card">
    <span style="font-size:10px;color:#888">Uptime</span><br><b>99.9%</b>
  </div>
</div>

<div class="footer">
  <div class="nav">
    <i data-lucide="database" onclick="location.href='nodes.html'"></i>
    <i data-lucide="activity" onclick="location.href='stats.html'"></i>
  </div>

  <div class="exec" onclick="alert('SYSTEM OVERRIDE: ACTIVE')">
    <div>EXEC</div>
  </div>

  <div class="nav">
    <i data-lucide="shield" class="active" onclick="location.href='security.html'"></i>
    <i data-lucide="cpu" onclick="location.href='terminal.html'"></i>
  </div>
</div>

<script>
// Logic Klik & Skor
let count = parseInt(localStorage.getItem('miftah_score')) || 0;
const scoreEl = document.getElementById('score');
const tapTarget = document.getElementById('tap-target');
const capyImg = document.getElementById('capy-img');

// Load skor awal
scoreEl.innerText = count.toLocaleString();

tapTarget.addEventListener('click', (e) => {
    count++;
    scoreEl.innerText = count.toLocaleString();
    localStorage.setItem('miftah_score', count);

    // Animasi klik
    capyImg.style.transform = 'scale(0.95)';
    setTimeout(() => {
        capyImg.style.transform = 'scale(1)';
    }, 50);

    // Vibrate HP kalau support
    if (navigator.vibrate) navigator.vibrate(10);
});

lucide.createIcons();
</script>

</body>
</html>

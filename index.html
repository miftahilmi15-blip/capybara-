<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Wealth OS — Miftah Prime</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            user-select: none;
            background: #05070a;
            color: #e7e5e4;
            height: 100vh;
        }

        /* Background Grid */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .glass {
            background: rgba(10, 15, 20, 0.8);
            border: 1px solid rgba(34, 211, 238, 0.15);
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }

        /* Header */
        .header {
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Score Display */
        .score {
            text-align: center;
            margin-top: 10px;
        }

        #score {
            font-size: 64px;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
        }

        /* Main Core Area */
        .main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 420px;
            position: relative;
            cursor: pointer;
        }

        #capy-img {
            max-width: 320px;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
            transition: transform 0.1s ease;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .pedestal {
            width: 260px;
            height: 15px;
            background: #111;
            border-top: 2px solid rgba(34, 211, 238, 0.4);
            margin-top: -20px;
            border-radius: 50% / 100% 100% 0 0;
            filter: blur(1px);
        }

        /* Stats Cards */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 20px;
        }

        .card {
            background: rgba(10, 15, 20, 0.8);
            border: 1px solid rgba(34, 211, 238, 0.15);
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
        }

        /* Footer Navigation */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: rgba(5, 7, 10, 0.95);
            border-top: 1px solid rgba(34, 211, 238, 0.1);
        }

        .nav-group {
            display: flex;
            gap: 40px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #3f3f46;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item.active {
            color: #22d3ee;
        }

        .exec-btn {
            position: absolute;
            left: 50%;
            top: -30px;
            transform: translateX(-50%) rotate(45deg);
            width: 65px;
            height: 65px;
            background: #05070a;
            border: 2px solid #22d3ee;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
            cursor: pointer;
        }

        .exec-text {
            transform: rotate(-45deg);
            font-size: 11px;
            font-weight: 900;
            color: #22d3ee;
        }

        /* Click Animation Popup */
        .tap-effect {
            position: absolute;
            color: #22d3ee;
            font-weight: 800;
            pointer-events: none;
            animation: rise 0.6s ease-out forwards;
        }

        @keyframes rise {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div style="font-weight:900; color:#22d3ee; font-size: 20px;">M</div>
            <div style="font-size:10px; color:#888; text-transform: uppercase;">Security Level: Prime</div>
            <div style="font-size:12px; color:white; font-weight:700">Miftah_Prime_OS</div>
        </div>
        <div class="glass" style="padding:8px 14px; border-radius:10px; font-size: 12px; color: #22d3ee;">
            ● ENCRYPTED
        </div>
    </div>

    <div class="score">
        <div style="font-size:10px; color:#888; letter-spacing:4px; text-transform: uppercase;">Resource Allocation</div>
        <div id="score">0</div>
        <div style="color:#22d3ee; font-weight:800; font-size: 14px;">.00 UNITS</div>
    </div>

    <div class="main" id="click-area">
        <img id="capy-img" 
             src="https://image.pollinations.ai/prompt/ultra_realistic_front_view_capybara_brown_fur_dark_background_cyan_rim_light_standing_on_black_stone_pedestal_stoic_cinematic_mood_high_detail_clean_background_full_body_centered_no_crop_--ar_1:1" 
             alt="System Core" />
        <div class="pedestal"></div>
    </div>

    <div class="stats">
        <div class="card">
            <span style="color:#888">Hash Rate</span><br>
            <b style="font-size: 16px;">+1.0</b>
        </div>
        <div class="card">
            <span style="color:#888">Index PPh</span><br>
            <b style="color:#22d3ee; font-size: 16px;">7.5M</b>
        </div>
        <div class="card">
            <span style="color:#888">Uptime</span><br>
            <b style="font-size: 16px;">99.9%</b>
        </div>
    </div>

    <div class="footer">
        <div class="nav-group">
            <div class="nav-item" onclick="alert('Nodes Terminal Locked')">
                <i data-lucide="database"></i>
            </div>
            <div class="nav-item" onclick="alert('Stats Analytics Offline')">
                <i data-lucide="activity"></i>
            </div>
        </div>

        <div class="exec-btn" onclick="alert('Executing Protocol...')">
            <div class="exec-text">EXEC</div>
        </div>

        <div class="nav-group">
            <div class="nav-item active">
                <i data-lucide="shield"></i>
            </div>
            <div class="nav-item" onclick="alert('CPU Terminal Restricted')">
                <i data-lucide="cpu"></i>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Game Logic
        let count = parseInt(localStorage.getItem('miftah_score')) || 0;
        const scoreDisplay = document.getElementById('score');
        const clickArea = document.getElementById('click-area');
        const capyImg = document.getElementById('capy-img');

        // Update display on load
        scoreDisplay.innerText = count.toLocaleString();

        clickArea.addEventListener('click', (e) => {
            // Increase Score
            count++;
            scoreDisplay.innerText = count.toLocaleString();
            localStorage.setItem('miftah_score', count);

            // Visual Feedback (Shrink effect)
            capyImg.style.transform = 'scale(0.92)';
            setTimeout(() => {
                capyImg.style.transform = 'scale(1)';
            }, 100);

            // Floating Text Effect
            createTapEffect(e.pageX, e.pageY);

            // Haptic Feedback
            if (navigator.vibrate) navigator.vibrate(15);
        });

        function createTapEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'tap-effect';
            effect.innerText = '+1';
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            document.body.appendChild(effect);

            setTimeout(() => {
                effect.remove();
            }, 600);
        }
    </script>
</body>
</html>

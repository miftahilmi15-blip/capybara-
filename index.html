<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>Wealth OS — Miftah Prime</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Inter',sans-serif;
  overflow:hidden;
  touch-action:none;
  user-select:none;
  color:#e7e5e4;
  background: #05070a; /* Gelap pekat */
}

/* Background Grid Effect */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
  background-size: 30px 30px;
  z-index: -1;
}

.main-orb{
  position:absolute;
  width:600px;
  height:600px;
  background: radial-gradient(circle, rgba(34,211,238,.08), transparent 70%);
  filter:blur(80px);
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:0;
}

.stoic-ring{
  position:absolute;
  inset:50%;
  width:450px;
  height:450px;
  transform:translate(-50%,-50%);
  border: 1px solid rgba(103,232,249,.1);
  /* Ubah jadi Hexagon look pakai clip-path jika ingin, tapi border-radius 2xl lebih clean */
  border-radius: 60px; 
  z-index:1;
  animation: ringRotate 30s linear infinite;
}

@keyframes ringRotate{
  from{ transform:translate(-50%,-50%) rotate(0deg); }
  to{ transform:translate(-50%,-50%) rotate(360deg); }
}

.glass{
  background:rgba(10, 15, 20, .8);
  border:1px solid rgba(34, 211, 238, .15);
  backdrop-filter:blur(15px);
  box-shadow: 0 15px 35px rgba(0,0,0,.8);
}

#score{
  font-variant-numeric:tabular-nums;
  letter-spacing:-0.02em;
  color:#fff;
  text-shadow: 0 0 25px rgba(34,211,238,.5);
}

#tap-container{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:420px;
  z-index: 20;
}

#parallax-wrap{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  transition:transform .15s ease-out;
}

/* Pedestal - Dibuat lebih kotak industrial */
.pedestal{
  position:absolute;
  bottom: 0px;
  left:50%;
  transform:translateX(-50%);
  width:280px;
  height:20px;
  background: #111;
  border-top: 2px solid rgba(34,211,238,.4);
  box-shadow: 0 -10px 30px rgba(34,211,238,.1);
  z-index:2;
}

#capy-img{
  position:relative;
  z-index:5;
  width:100%;
  max-width:320px;
  filter: drop-shadow(0 0 20px rgba(0,0,0,1));
  animation: floatCapy 4s ease-in-out infinite;
}

@keyframes floatCapy{
  0%,100%{ transform:translateY(0px) scale(1); }
  50%{ transform:translateY(-8px) scale(1.01); }
}

.footer-blur{
  background: rgba(5, 7, 10, 0.9);
  border-top: 1px solid rgba(34, 211, 238, 0.1);
}

.nav-icon{ color:#3f3f46; transition:.3s; }
.nav-icon.active{ color:#22d3ee; filter: drop-shadow(0 0 8px #22d3ee); }

.tap-inc {
  position: absolute;
  color: #22d3ee;
  font-weight: 800;
  font-size: 28px;
  pointer-events: none;
  z-index: 100;
  font-family: 'Inter', sans-serif;
}
</style>
</head>

<body class="h-screen flex flex-col">

<div class="main-orb"></div>
<div class="stoic-ring"></div>

<header class="relative z-50 p-6 flex justify-between items-center">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 bg-zinc-900 border border-cyan-500/30 flex items-center justify-center">
      <span class="text-cyan-400 font-black text-sm">M</span>
    </div>
    <div class="leading-none">
      <p class="text-[8px] uppercase tracking-[.4em] text-cyan-500/50 font-bold mb-1">Security Level: Prime</p>
      <p class="text-xs text-white font-bold tracking-tight">Miftah_Prime_OS</p>
    </div>
  </div>

  <div class="glass px-4 py-2 rounded-lg flex items-center gap-2 border-cyan-500/20">
    <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></div>
    <span class="text-[9px] uppercase tracking-widest text-cyan-300 font-bold">Encrypted</span>
  </div>
</header>

<section class="relative z-40 text-center mt-6">
  <p class="text-[9px] uppercase tracking-[0.6em] text-zinc-500 font-bold mb-2">Resource Allocation</p>
  <div class="flex items-center justify-center gap-2">
    <h1 id="score" class="text-6xl md:text-7xl font-black">0</h1>
    <div class="text-left leading-none">
      <span class="block text-cyan-500 text-lg font-black">.00</span>
      <span class="text-[9px] text-zinc-600 font-bold uppercase tracking-tighter">Units</span>
    </div>
  </div>
  
  <div class="mt-8 px-12">
    <div class="relative h-1 bg-zinc-900 rounded-full overflow-hidden border border-white/5">
      <div id="progress-bar" class="absolute h-full bg-cyan-500 shadow-[0_0_15px_#22d3ee]" style="width:40%"></div>
    </div>
  </div>
</section>

<main class="flex-grow relative flex items-center justify-center">
  <div id="tap-container" class="cursor-pointer">
    <div id="parallax-wrap">
      <div class="absolute bottom-0 w-64 h-10 bg-cyan-500/5 blur-3xl"></div>
      
      <img id="capy-img" src="https://image.pollinations.ai/prompt/ultra_realistic_front_view_capybara_brown_fur_dark_background_cyan_rim_light_standing_on_black_stone_pedestal_stoic_cinematic_mood_high_detail_clean_background_full_body_centered_no_crop_--ar_1:1" alt="System Core" class="pointer-events-none" />
      
      <div class="pedestal"></div>
    </div>
  </div>
</main>

<section class="relative z-40 px-6 grid grid-cols-3 gap-3 mb-24">
  <div class="glass p-4 rounded-xl border-l-2 border-l-cyan-500/50">
    <p class="text-[7px] uppercase tracking-widest text-zinc-500 font-bold mb-1">Hash Rate</p>
    <p class="text-sm text-white font-mono">+1.0</p>
  </div>
  <div class="glass p-4 rounded-xl border-b-2 border-b-cyan-500/50 -translate-y-2">
    <p class="text-[7px] uppercase tracking-widest text-cyan-500 font-bold mb-1">Index PPh</p>
    <p class="text-sm text-cyan-400 font-mono font-bold">7.5M</p>
  </div>
  <div class="glass p-4 rounded-xl border-r-2 border-r-cyan-500/50">
    <p class="text-[7px] uppercase tracking-widest text-zinc-500 font-bold mb-1">Uptime</p>
    <p class="text-sm text-white font-mono">99.9%</p>
  </div>
</section>

<footer class="fixed bottom-0 left-0 right-0 h-20 footer-blur flex items-center justify-around px-10 pb-4 z-50">
  <div class="flex gap-12">
    <i data-lucide="database" class="nav-icon w-5 h-5 cursor-pointer" onclick="location.href='nodes.html'"></i>
    <i data-lucide="activity" class="nav-icon w-5 h-5 cursor-pointer" onclick="location.href='stats.html'"></i>
  </div>

  <div class="absolute -top-6 left-1/2 -translate-x-1/2">
    <div class="w-16 h-16 bg-zinc-950 border border-cyan-500/40 rounded-xl flex items-center justify-center rotate-45 active:scale-90 transition-transform cursor-pointer shadow-[0_0_20px_rgba(34,211,238,0.2)]" onclick="location.href='exec.html'">
      <div class="-rotate-45 text-[9px] font-black text-cyan-400 tracking-tighter">EXEC</div>
    </div>
  </div>

  <div class="flex gap-12">
    <i data-lucide="shield" class="nav-icon active w-5 h-5 cursor-pointer" onclick="location.href='security.html'"></i>
    <i data-lucide="cpu" class="nav-icon w-5 h-5 cursor-pointer" onclick="location.href='terminal.html'"></i>
  </div>
</footer>

<script>
lucide.createIcons();

const scoreEl = document.getElementById('score');
const tapContainer = document.getElementById('tap-container');
const progressBar = document.getElementById('progress-bar');
const capyImg = document.getElementById('capy-img');
let currentScore = 0;

// Parallax Subtle
document.addEventListener('pointermove', (e) => {
  const x = (window.innerWidth / 2 - e.clientX) / 80;
  const y = (window.innerHeight / 2 - e.clientY) / 80;
  document.getElementById('parallax-wrap').style.transform = `translate(${x}px, ${y}px)`;
});

// Tap Logic
tapContainer.addEventListener('pointerdown', (e) => {
  currentScore += 1;
  scoreEl.innerText = Math.floor(currentScore).toLocaleString('en-US');
  
  // Progress Bar Logic
  const progress = Math.min(100, 40 + (currentScore * 0.1));
  progressBar.style.width = `${progress}%`;

  // Image Punch Effect
  capyImg.style.transform = 'scale(0.96)';
  setTimeout(() => { capyImg.style.transform = 'scale(1)'; }, 50);

  // Floating Particle
  const tapText = document.createElement('div');
  tapText.className = 'tap-inc';
  tapText.innerText = '+1';
  tapText.style.left = `${e.clientX}px`;
  tapText.style.top = `${e.clientY}px`;
  document.body.appendChild(tapText);

  tapText.animate([
    { transform: 'translateY(0) scale(1)', opacity: 1 },
    { transform: 'translateY(-120px) scale(1.5)', opacity: 0 }
  ], { duration: 600, easing: 'ease-out' });

  setTimeout(() => tapText.remove(), 600);
});
</script>
</body>
</html>

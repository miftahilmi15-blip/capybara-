<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoCapy - Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: white; touch-action: manipulation; }
        
        /* Gradient Background ala Screenshot */
        .bg-main {
            background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
        }

        /* Tombol Teams Emas */
        .btn-teams {
            background: linear-gradient(90deg, #e2c08d 0%, #c19a5b 100%);
            box-shadow: 0 4px 15px rgba(193, 154, 91, 0.3);
        }

        /* Progress Bar */
        .progress-container {
            background: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #c19a5b 0%, #f3d6a4 100%);
            width: 65%; /* Contoh level 2/10 */
        }

        /* Bottom Nav Glass */
        .bottom-nav {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* Floating Animation untuk Tap */
        @keyframes tap-effect {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        .active-tap { animation: tap-effect 0.1s ease-out; }

        /* Timer Lingkaran di Tengah Bawah */
        .farming-circle {
            border: 4px solid #c19a5b;
            box-shadow: 0 0 20px rgba(193, 154, 91, 0.4);
        }
    </style>
</head>
<body class="bg-main h-screen flex flex-col overflow-hidden">

    <div class="p-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-zinc-800 flex items-center justify-center">
                <span class="text-xl">👤</span>
            </div>
            <div>
                <p class="text-[10px] text-zinc-500 uppercase">My profile</p>
                <p class="font-bold text-sm">Miftah</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button class="bg-[#4c3a6b] px-4 py-2 rounded-xl text-xs font-bold">Upgrades</button>
            <button class="bg-zinc-800 p-2 rounded-xl text-zinc-400">⚙️</button>
        </div>
    </div>

    <div class="px-4 mb-4">
        <button class="btn-teams w-full py-4 rounded-2xl flex items-center justify-center gap-3 text-zinc-900 font-black uppercase tracking-widest italic">
            <span class="text-xl">⭐</span> Teams
        </button>
    </div>

    <div class="text-center my-2">
        <div class="flex items-center justify-center gap-2">
            <img src="https://img.icons8.com/emoji/96/gold-coin.png" class="w-10 h-10" alt="coin">
            <h1 id="total-coins" class="text-4xl font-black tracking-tight">273 425</h1>
        </div>
    </div>

    <div class="px-6 mb-4">
        <div class="flex justify-between items-center mb-1 px-1">
            <p class="text-xs font-bold text-zinc-300">Wanderer ➔</p>
            <p class="text-xs text-zinc-500">Level <span class="text-zinc-200 font-bold">2/10</span></p>
        </div>
        <div class="progress-container h-2 w-full">
            <div class="progress-fill h-full"></div>
        </div>
    </div>

    <div class="flex-grow flex items-center justify-center relative">
        <div id="tap-area" class="cursor-pointer transition-transform duration-75 active:scale-95">
            <img id="capy-img" 
                 src="https://image.pollinations.ai/prompt/Highly_detailed_realistic_3D_render_of_a_majestic_capybara_sitting_on_a_mossy_stone_pedestal,_cinematic_lighting,_wearing_a_tactical_harness,_8k_resolution_--ar_1:1" 
                 class="w-64 h-64 md:w-80 md:h-80 object-contain drop-shadow-[0_20px_60px_rgba(0,0,0,0.8)]"
                 alt="Capy Hero">
        </div>
    </div>

    <div class="px-6 grid grid-cols-3 gap-2 mb-24">
        <div class="bg-zinc-900/50 p-3 rounded-2xl border border-white/5 flex flex-col items-center">
            <div class="flex items-center gap-1 text-[10px] text-zinc-500 font-bold mb-1">
                <span>👆</span> Per tap
            </div>
            <p class="text-sm font-black text-yellow-500">1.50</p>
        </div>
        <div class="bg-zinc-900/50 p-3 rounded-2xl border border-white/5 flex flex-col items-center">
            <div class="flex items-center gap-1 text-[10px] text-zinc-500 font-bold mb-1">
                <span>💎</span> Per hour
            </div>
            <p class="text-sm font-black text-green-500">6480</p>
        </div>
        <div class="bg-zinc-900/50 p-3 rounded-2xl border border-white/5 flex flex-col items-center">
            <div class="flex items-center gap-1 text-[10px] text-zinc-500 font-bold mb-1">
                <span>⚡</span> Energy
            </div>
            <p class="text-sm font-black text-white">4996/5000</p>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 h-24 bottom-nav flex items-center justify-around px-2 pb-2">
        
        <div class="flex gap-8">
            <div class="flex flex-col items-center opacity-50">
                <span class="text-lg">📚</span>
                <p class="text-[8px] font-bold uppercase mt-1">Staking</p>
            </div>
            <div class="flex flex-col items-center text-cyan-400">
                <span class="text-lg">📋</span>
                <p class="text-[8px] font-bold uppercase mt-1">Tasks</p>
            </div>
        </div>

        <div class="absolute -top-12 left-1/2 -translate-x-1/2 flex flex-col items-center">
            <div class="farming-circle w-20 h-20 bg-zinc-950 rounded-full flex flex-col items-center justify-center border-4">
                <p class="text-[8px] text-yellow-500 font-bold">02:56:54</p>
                <p class="text-sm font-black">334.8</p>
            </div>
        </div>

        <div class="flex gap-8">
            <div class="flex flex-col items-center opacity-50">
                <span class="text-lg">🐱</span>
                <p class="text-[8px] font-bold uppercase mt-1">Friends</p>
            </div>
            <div class="flex flex-col items-center opacity-50">
                <span class="text-lg">🐭</span>
                <p class="text-[8px] font-bold uppercase mt-1">Games</p>
            </div>
        </div>
    </div>

    <script>
        const tapArea = document.getElementById('tap-area');
        const capyImg = document.getElementById('capy-img');
        const scoreDisplay = document.getElementById('total-coins');

        let score = 273425;

        tapArea.addEventListener('click', (e) => {
            score += 1.5;
            scoreDisplay.innerText = Math.floor(score).toLocaleString().replace(/,/g, ' ');

            // Effect Floating +1.5
            const plus = document.createElement('div');
            plus.innerText = '+1.5';
            plus.style.position = 'fixed';
            plus.style.left = `${e.clientX}px`;
            plus.style.top = `${e.clientY}px`;
            plus.style.color = '#f3d6a4';
            plus.style.fontWeight = '900';
            plus.style.pointerEvents = 'none';
            plus.animate([
                { opacity: 1, transform: 'translateY(0)' },
                { opacity: 0, transform: 'translateY(-100px)' }
            ], { duration: 700 });

            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 700);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Capy Sovereign OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Desain kaku total semen militer tanpa toleransi melengkung */
        * { border-radius: 0px !important; box-sizing: border-box; }
        body { background: #020617; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .nav-item-box.active { background: rgba(34, 211, 238, 0.1); border-color: #22d3ee; color: #22d3ee; }
    </style>
</head>
<body class="p-3">

    <div class="border border-cyan-500/30 bg-slate-950 p-3 mb-3 flex justify-between items-center flex-shrink-0">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-cyan-500/20 border border-cyan-400 flex items-center justify-center font-black text-cyan-400">CP</div>
            <div>
                <div id="username-display" class="text-xs font-black tracking-wide">MIFTAH_DEV</div>
                <div class="text-[8px] text-gray-500 font-bold uppercase tracking-wider">Sovereign Node Operator</div>
            </div>
        </div>
        <div class="text-right">
            <div class="text-[8px] text-cyan-400 font-mono font-bold tracking-widest">SYS_STATUS</div>
            <div class="text-[10px] text-emerald-400 font-black">ONLINE</div>
        </div>
    </div>

    <div class="flex-1 border border-cyan-500/20 bg-slate-950/40 relative">
        <iframe id="content-frame" src="home.html" class="w-full h-full border-none"></iframe>
    </div>

    <div class="grid grid-cols-6 gap-1 mt-3 flex-shrink-0 text-center">
        <button onclick="changePage('home.html', this)" class="nav-item-box active border border-slate-800 bg-slate-950 py-2 text-[8px] font-black tracking-tighter uppercase transition">HOME</button>
        <button onclick="changePage('cpu.html', this)" class="nav-item-box border border-slate-800 bg-slate-950 py-2 text-[8px] font-black tracking-tighter uppercase transition">CPU</button>
        <button onclick="changePage('network.html', this)" class="nav-item-box border border-slate-800 bg-slate-950 py-2 text-[8px] font-black tracking-tighter uppercase transition">NET</button>
        <button onclick="changePage('activity.html', this)" class="nav-item-box border border-slate-800 bg-slate-950 py-2 text-[8px] font-black tracking-tighter uppercase transition">ACT</button>
        <button onclick="changePage('wallet.html', this)" class="nav-item-box border border-slate-800 bg-slate-950 py-2 text-[8px] font-black tracking-tighter uppercase transition">WAL</button>
        <button onclick="changePage('profile.html', this)" class="nav-item-box border border-slate-800 bg-slate-950 py-2 text-[8px] font-black tracking-tighter uppercase transition">PRO</button>
    </div>

    <script>
        // Global Player Database (Dicadangkan untuk mutasi data real-time anak iframe)
        window.playerData = {
            telegram_id: "miftah_dev",
            coins: 150000,
            checkin_streak: 2,
            last_checkin_time: 0,
            completed_tasks: {},
            referred_agents: [
                { username: "crypto_phantom", lvl: 4, isPremium: true, contribution: 1250 }
            ],
            referred_bonus_total: 1250
        };

        // Otomatisasi inisialisasi Telegram WebApp SDK
        document.addEventListener("DOMContentLoaded", () => {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand(); // Paksa aplikasi terbuka full screen di HP

                // Tarik data profil asli dari telegram user
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    window.playerData.telegram_id = user.username || user.id.toString();
                    document.getElementById('username-display').innerText = window.playerData.telegram_id.toUpperCase();
                }
            }
        });

        // Controller Navigasi Iframe
        function changePage(pageUrl, btn) {
            document.getElementById('content-frame').src = pageUrl;
            document.querySelectorAll('.nav-item-box').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
        }

        // Bridge Database Jembatan Penghubung menuju Firebase Cloud
        function saveDataToFirebase(updatedData) {
            console.log("📡 Mengirim enkripsi data baru ke Firebase:", updatedData);
            
            // Satukan mutasi data lokal agar sinkronisasi realtime gak patah
            Object.assign(window.playerData, updatedData);

            // TODO: Tempat naruh endpoint fetch() API Firebase lu besok, Bos!
            /*
            fetch('https://your-firebase-url.firebaseio.com/users/' + window.playerData.telegram_id + '.json', {
                method: 'PATCH',
                body: JSON.stringify(updatedData)
            });
            */
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoCapy - The Perfect Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #050505; 
            color: #fff; 
            touch-action: none; 
            overflow: hidden;
            user-select: none;
        }

        /* ===== 1. PARALLAX WRAPPER (Motion Layer 1) ===== */
        #parallax-wrap {
            will-change: transform;
            transition: transform .15s ease-out;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        /* ===== 2. CHARACTER IDLE (Motion Layer 2) ===== */
        #capy-img {
            transform-origin: center;
            filter: contrast(1.1) saturate(1.1) brightness(1.05);
            image-rendering: auto;
            transition: filter 0.2s ease;
        }

        @keyframes floaty {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1.5deg); }
        }
        .animate-float { animation: floaty 4s ease-in-out infinite; }

        /* ===== 3. INTERACTION FEEDBACK (Lighting) ===== */
        #tap-container:active #capy-img {
            filter: brightness(1.2) saturate(1.3) drop-shadow(0 0 40px rgba(251,191,36,0.4));
        }

        /* ===== 4. PREMIUM UI ELEMENTS ===== */
        .glass-stats { 
            background: linear-gradient(180deg, rgba(30,30,30,0.6) 0%, rgba(10,10,10,0.8) 100%); 
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .score-pop { animation: scorePop .25s ease; }
        @keyframes scorePop {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(2); }
        }

        /* Rotating Rings */
        @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spinReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        .animate-spin-slow { animation: spinSlow 25s linear infinite; }
        .animate-spin-reverse { animation: spinReverse 18s linear infinite; }

        /* Particles Background */
        .particles::before {
            content: ''; position: absolute; inset: 0;
            background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,.05) 1px, transparent 1px), 
                              radial-gradient(circle at 80% 70%, rgba(251,191,36,.1) 2px, transparent 2px);
            animation: particleMove 12s linear infinite;
        }
        @keyframes particleMove { from { transform: translateY(0px); } to { transform: translateY(-50px); } }

        /* Floating Coins */
        .coin { position: absolute; z-index: 30; font-size: 2rem; filter: drop-shadow(0 0 10px rgba(255,215,0,.4)); animation: floatCoin 4s ease-in-out infinite; }
        .coin-1 { top: 10%; right: -20px; }
        .coin-2 { top: 40%; right: -40px; animation-delay: 1s; }
        .coin-3 { top: 60%; left: -30px; animation-delay: 2s; }
        @keyframes floatCoin { 0%, 100% { transform: translateY(0px); opacity: .6; } 50% { transform: translateY(-15px); opacity: 1; } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="relative z-50 p-6 flex justify-between items-center">
        <div class="flex items-center gap-3 glass-stats py-2 px-4 rounded-2xl">
            <div class="w-10 h-10 rounded-xl bg-zinc-800 flex items-center justify-center border border-white/10 font-bold text-yellow-500">M</div>
            <div>
                <p class="text-[10px] text-zinc-500 font-black uppercase tracking-widest leading-none mb-1">Newbie • Lv.0</p>
                <p class="text-sm font-extrabold">Miftah_Dev</p>
            </div>
        </div>
        <button class="glass-stats w-11 h-11 rounded-2xl flex items-center justify-center text-xl active:scale-90 transition-transform">⚙️</button>
    </header>

    <div class="relative z-50 text-center mt-2 mb-6">
        <div class="flex items-center justify-center gap-3">
            <img src="https://img.icons8.com/emoji/96/gold-coin.png" class="w-12 h-12 drop-shadow-[0_0_15px_rgba(251,191,36,0.3)]" alt="coin">
            <h1 id="score" class="text-6xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-white to-zinc-600">0</h1>
        </div>
        <div class="mt-6 px-14">
            <div class="flex justify-between text-[10px] font-black text-zinc-500 mb-2 tracking-widest uppercase">
                <span>Next Milestone</span>
                <span class="text-zinc-200">0%</span>
            </div>
            <div class="h-2 bg-zinc-900 rounded-full border border-white/5 p-[1px] overflow-hidden">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-yellow-700 to-yellow-400 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <main class="relative flex-grow flex items-center justify-center z-10 overflow-hidden">
        <div class="absolute w-[600px] h-[600px] rounded-full bg-yellow-500/5 blur-[130px]"></div>
        <div class="absolute w-[440px] h-[440px] rounded-full border border-yellow-500/10 animate-spin-slow"></div>
        <div class="absolute w-[340px] h-[340px] rounded-full border border-cyan-400/5 animate-spin-reverse"></div>
        <div class="particles absolute inset-0 pointer-events-none"></div>

        <div id="tap-container" class="relative transition-transform duration-200 active:scale-95 cursor-pointer">
            
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-64 h-14 bg-black/70 blur-3xl rounded-full"></div>
            
            <div class="absolute inset-0 rounded-full bg-gradient-to-b from-yellow-400/5 to-transparent blur-3xl scale-150"></div>

            <div id="parallax-wrap">
                <img id="capy-img"
                    src="https://image.pollinations.ai/prompt/pixar_style_capybara_character_simple_clean_shapes_front_view_centered_pose_two_legs_visible_high_quality_3D_mobile_game_mascot_black_background_--ar_1:1"
                    class="relative z-10 w-80 h-80 md:w-[28rem] md:h-[28rem] object-contain animate-float select-none pointer-events-none"
                    alt="CryptoCapy">
            </div>

            <div class="coin coin-1">🪙</div>
            <div class="coin coin-2">🪙</div>
            <div class="coin coin-3">🪙</div>

            <div class="absolute top-12 right-0 z-20 px-4 py-1.5 rounded-full bg-yellow-500/10 border border-yellow-400/20 backdrop-blur-2xl">
                <p class="text-[10px] font-black tracking-[0.2em] text-yellow-400 uppercase">Legendary</p>
            </div>
        </div>
    </main>

    <div class="relative z-50 px-6 grid grid-cols-3 gap-4 -translate-y-8">
        <div class="glass-stats p-4 rounded-[2rem] flex flex-col items-center">
            <span class="text-[9px] font-black text-zinc-500 uppercase mb-1 tracking-tighter">Per Tap</span>
            <span class="text-sm font-black text-yellow-500">+1</span>
        </div>
        <div class="glass-stats p-4 rounded-[2rem] flex flex-col items-center border-yellow-500/20 scale-110 shadow-2xl bg-zinc-900/80">
            <span class="text-[9px] font-black text-zinc-500 uppercase mb-1 tracking-tighter">Per Hour</span>
            <span class="text-sm font-black text-green-400">0</span>
        </div>
        <div class="glass-stats p-4 rounded-[2rem] flex flex-col items-center">
            <span class="text-[9px] font-black text-zinc-500 uppercase mb-1 tracking-tighter">Energy</span>
            <span class="text-sm font-black">50/50</span>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 h-28 backdrop-blur-3xl bg-black/80 border-t border-white/5 flex items-center justify-around px-6 pb-6 z-50">
        <div class="flex gap-12 opacity-30">
            <div class="flex flex-col items-center gap-1"><span class="text-2xl">💎</span><p class="text-[8px] font-bold">STAKING</p></div>
            <div class="flex flex-col items-center gap-1"><span class="text-2xl">📋</span><p class="text-[8px] font-bold">TASKS</p></div>
        </div>

        <div class="absolute -top-10 left-1/2 -translate-x-1/2 group">
            <div class="w-24 h-24 bg-zinc-950 rounded-full p-1.5 shadow-[0_0_40px_rgba(193,154,91,0.2)] border border-yellow-500/20 active:scale-90 transition-transform">
                <div class="w-full h-full rounded-full border-[3px] border-yellow-500/40 flex flex-col items-center justify-center bg-gradient-to-b from-zinc-900 to-black">
                    <p class="text-[9px] font-black text-yellow-500 leading-none">FARMING</p>
                    <p class="text-base font-black mt-1">0.00</p>
                </div>
            </div>
        </div>

        <div class="flex gap-12 opacity-30">
            <div class="flex flex-col items-center gap-1"><span class="text-2xl">👥</span><p class="text-[8px] font-bold">FRIENDS</p></div>
            <div class="flex flex-col items-center gap-1"><span class="text-2xl">🐭</span><p class="text-[8px] font-bold">GAMES</p></div>
        </div>
    </footer>

    <script>
        const scoreEl = document.getElementById('score');
        const tapContainer = document.getElementById('tap-container');
        const parallaxWrap = document.getElementById('parallax-wrap');
        
        let currentScore = 0;

        // 1. PERFECT PARALLAX (No Conflict with Animation)
        document.addEventListener('pointermove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 45;
            const y = (window.innerHeight / 2 - e.clientY) / 45;
            parallaxWrap.style.transform = `translate(${x}px, ${y}px)`;
        });

        // 2. SHOCKWAVE EFFECT
        function createShockwave(x, y) {
            const ring = document.createElement('div');
            ring.className = 'fixed w-10 h-10 rounded-full border-2 border-yellow-400/40 pointer-events-none z-50';
            ring.style.left = `${x - 20}px`; ring.style.top = `${y - 20}px`;
            document.body.appendChild(ring);
            ring.animate([
                { transform: 'scale(.5)', opacity: 1 },
                { transform: 'scale(5)', opacity: 0 }
            ], { duration: 600, easing: 'ease-out' });
            setTimeout(() => ring.remove(), 600);
        }

        // 3. FLOATING TEXT (+1)
        function createTapEffect(x, y, text = '+1') {
            const plus = document.createElement('div');
            plus.innerText = text;
            plus.className = 'fixed pointer-events-none text-3xl font-black text-yellow-400 z-[60]';
            plus.style.left = `${x}px`; plus.style.top = `${y}px`;
            plus.style.textShadow = '0 0 20px rgba(251,191,36,0.8)';
            document.body.appendChild(plus);
            plus.animate([
                { opacity: 1, transform: 'translateY(0px) scale(1)', filter: 'blur(0px)' },
                { opacity: 0, transform: 'translateY(-180px) scale(2.5)', filter: 'blur(10px)' }
            ], { duration: 1000, easing: 'cubic-bezier(0.22, 1, 0.36, 1)' });
            setTimeout(() => plus.remove(), 1000);
        }

        // 4. MAIN TAP LOGIC
        tapContainer.addEventListener('pointerdown', (e) => {
            currentScore += 1;
            scoreEl.innerText = Math.floor(currentScore).toLocaleString().replace(/,/g, ' ');

            // Score Animation
            scoreEl.classList.remove('score-pop');
            void scoreEl.offsetWidth; // Reflow
            scoreEl.classList.add('score-pop');

            createTapEffect(e.clientX, e.clientY);
            createShockwave(e.clientX, e.clientY);

            // Crit Logic (Lucky Tap)
            if (Math.random() > 0.94) {
                createTapEffect(e.clientX, e.clientY, 'CRIT +15');
                currentScore += 15;
            }
        });
    </script>
</body>
</html>

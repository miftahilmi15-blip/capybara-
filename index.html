<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoCapy - Premium Game Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #050505; 
            color: #fff; 
            touch-action: none; 
            overflow: hidden;
            user-select: none;
        }

        /* Subtle Noise Layer */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: .015;
            background-image: radial-gradient(rgba(255,255,255,.6) 1px, transparent 1px);
            background-size: 4px 4px;
            z-index: 100;
        }

        /* Depth & Grounding (FIX 4) */
        .glass-stats { 
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            box-shadow: 
                inset 0 1px 0 rgba(255,255,255,0.03),
                0 10px 30px rgba(0,0,0,0.18);
            border: none;
        }

        /* FIX 2: Score Focus */
        #score {
            text-shadow: 0 0 20px rgba(255,255,255,0.08);
        }

        /* FIX 3: Natural Tap Interaction */
        #tap-container {
            transition: transform 0.08s ease;
            will-change: transform;
        }
        #tap-container:active {
            transform: scale(0.985);
        }

        #parallax-wrap {
            transition: transform 0.3s ease-out;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        #capy-img {
            filter: contrast(1.08) brightness(1.02) drop-shadow(0 20px 40px rgba(0,0,0,0.7));
        }

        @keyframes floaty {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .animate-float { animation: floaty 6s ease-in-out infinite; }

        /* Icon Styling */
        .lucide { width: 18px; height: 18px; stroke-width: 2.5px; opacity: 0.8; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="relative z-50 p-6 flex justify-between items-center">
        <div class="flex items-center gap-3 glass-stats py-2 px-4 rounded-2xl">
            <div class="w-8 h-8 rounded-xl bg-zinc-900 flex items-center justify-center font-bold text-yellow-600/60 text-xs">M</div>
            <div>
                <p class="text-[9px] text-zinc-600 font-bold uppercase tracking-[0.18em] mb-0.5">Player</p>
                <p class="text-sm font-bold tracking-tight">Miftah_Dev</p>
            </div>
        </div>
        <button class="glass-stats w-10 h-10 rounded-xl flex items-center justify-center active:scale-95 transition-all text-zinc-500">
            <i data-lucide="settings"></i>
        </button>
    </header>

    <div class="relative z-50 text-center mt-2 mb-8">
        <div class="flex items-center justify-center gap-3 mb-1">
            <i data-lucide="coins" class="text-yellow-500/80 w-5 h-5"></i>
            <h1 id="score" class="text-5xl font-black tracking-tight text-white">0</h1>
        </div>
        <div class="mt-6 px-24">
            <div class="h-[2px] bg-white/[0.04] rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full rounded-full bg-white/30 transition-all duration-500" style="width: 45%"></div>
            </div>
        </div>
    </div>

    <main class="relative flex-grow flex items-center justify-center z-10 overflow-hidden">
        <div class="absolute w-[300px] h-[300px] bg-yellow-500/[0.025] blur-[120px] rounded-full"></div>

        <div id="tap-container" class="relative cursor-pointer">
            <div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-40 h-8 bg-black/70 blur-3xl rounded-full"></div>
            
            <div id="parallax-wrap" class="relative">
                <div class="absolute inset-0 z-20 pointer-events-none scale-110 
                    bg-[radial-gradient(circle,transparent_40%,#050505_85%)]">
                </div>

                <img id="capy-img"
                    src="https://image.pollinations.ai/prompt/3D_pixar_style_capybara_character_centered_pose_mobile_game_mascot_black_background_--ar_1:1"
                    class="relative z-10 w-64 h-64 md:w-[24rem] md:h-[24rem] object-contain animate-float select-none pointer-events-none"
                    alt="CryptoCapy">
            </div>

            <div class="absolute top-6 right-2 z-40 px-2 py-0.5 rounded bg-white/[0.02]">
                <p class="text-[7px] font-bold tracking-[0.18em] text-zinc-600 uppercase">Legendary</p>
            </div>
        </div>
    </main>

    <div class="relative z-50 px-10 grid grid-cols-3 gap-3 -translate-y-1">
        <div class="glass-stats py-3 rounded-2xl flex flex-col items-center">
            <span class="text-[7px] font-bold text-zinc-600 uppercase tracking-[0.18em] mb-1.5">Tap Profit</span>
            <span class="text-xs font-semibold text-zinc-400">+1</span>
        </div>
        <div class="glass-stats py-3 rounded-2xl flex flex-col items-center">
            <span class="text-[7px] font-bold text-zinc-600 uppercase tracking-[0.18em] mb-1.5">Hourly</span>
            <span class="text-xs font-semibold text-white/70">1.2K</span>
        </div>
        <div class="glass-stats py-3 rounded-2xl flex flex-col items-center">
            <span class="text-[7px] font-bold text-zinc-600 uppercase tracking-[0.18em] mb-1.5">Energy</span>
            <span class="text-xs font-semibold text-zinc-400">1K</span>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 h-16 bg-black/50 backdrop-blur-xl border-t border-white/[0.01] flex items-center justify-around px-12 pb-2 z-50">
        <div class="flex items-center gap-8 text-zinc-500">
            <i data-lucide="gem" class="hover:text-zinc-300 transition-colors"></i>
            <i data-lucide="clipboard-list" class="hover:text-zinc-300 transition-colors"></i>
        </div>

        <div class="absolute -top-7 left-1/2 -translate-x-1/2">
            <div class="w-16 h-16 bg-[#101010] backdrop-blur-2xl rounded-full p-1 border border-white/[0.015] active:scale-90 transition-all shadow-none">
                <div class="w-full h-full rounded-full bg-zinc-900/20 flex flex-col items-center justify-center border border-white/[0.01]">
                    <span class="text-[9px] font-bold text-yellow-600/80 tracking-tighter leading-none mb-0.5">FARM</span>
                    <span class="text-[7px] font-bold text-white/10 tracking-widest uppercase">Idle</span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-8 text-zinc-500">
            <i data-lucide="users" class="hover:text-zinc-300 transition-colors"></i>
            <i data-lucide="gamepad-2" class="hover:text-zinc-300 transition-colors"></i>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        const scoreEl = document.getElementById('score');
        const tapContainer = document.getElementById('tap-container');
        const parallaxWrap = document.getElementById('parallax-wrap');
        let currentScore = 0;

        // Parallax sensitivity reduced for premium feel
        document.addEventListener('pointermove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 100;
            const y = (window.innerHeight / 2 - e.clientY) / 100;
            parallaxWrap.style.transform = `translate(${x}px, ${y}px)`;
        });

        // FIX 9: Subtle Yellow Spark (Emotional Anchor)
        function createSpark(x, y) {
            const spark = document.createElement('div');
            spark.className = 'fixed w-1 h-1 bg-yellow-500/40 rounded-full pointer-events-none z-[60]';
            spark.style.left = `${x}px`; spark.style.top = `${y}px`;
            document.body.appendChild(spark);
            
            spark.animate([
                { opacity: 1, scale: 1 },
                { opacity: 0, scale: 10 }
            ], { duration: 350, easing: 'ease-out' });
            
            setTimeout(() => spark.remove(), 350);
        }

        tapContainer.addEventListener('pointerdown', (e) => {
            currentScore += 1;
            scoreEl.innerText = Math.floor(currentScore).toLocaleString();
            
            // Subtle flash feedback
            scoreEl.animate([
                { opacity: 0.7, transform: 'scale(0.98)' },
                { opacity: 1, transform: 'scale(1)' }
            ], { duration: 100 });

            createSpark(e.clientX, e.clientY);
        });
    </script>
</body>
</html>

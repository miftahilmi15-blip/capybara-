<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Miftah Prime — Wealth OS</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
* {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}

body {
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  user-select: none;
  background: radial-gradient(circle at top, #0f172a 0%, #05070a 100%);
  color: #e7e5e4;
  height: 100vh;
  display: flex; flex-direction: column;
}

/* Background Grid Cyber */
body::after {
  content: ''; position: fixed; inset: 0;
  background: 
    linear-gradient(rgba(34,211,238,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,211,238,0.02) 1px, transparent 1px);
  background-size: 40px 40px; z-index: -1;
}

/* HEADER */
.header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; }

/* PROGRESS AREA */
.progress-section { width: 100%; padding: 0 24px; margin-bottom: 10px; }

/* CENTER AREA */
.content-area {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center; position: relative;
}

#score {
  font-size: 56px; font-weight: 900; color: white;
  text-shadow: 0 0 40px rgba(34, 211, 238, 0.4); margin-bottom: 5px;
}

.capy-container { position: relative; width: 320px; pointer-events: none; }

/* Animasi Melayang Capy */
@keyframes capyFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

#capy-img {
  width: 100%; filter: drop-shadow(0 0 30px rgba(34,211,238,0.2));
  transition: transform 0.08s cubic-bezier(0.2, 0.8, 0.2, 1.2);
  animation: capyFloat 4s ease-in-out infinite;
}

.pedestal {
  width: 260px; height: 10px; background: #000;
  border-top: 2px solid #22d3ee; border-radius: 50% / 100% 100% 0 0;
  margin: -30px auto 0; box-shadow: 0 10px 40px rgba(34,211,238,0.3);
}

/* FLOATING TEXT (+2) */
.plus-val {
  position: absolute; color: white; font-weight: 900; font-size: 32px;
  pointer-events: none; animation: flyUp 0.8s ease-out forwards; z-index: 100;
}
@keyframes flyUp {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
}

/* MINI STATS */
.mini-stats {
  display: flex; justify-content: center; gap: 25px; margin-top: 20px;
}
.mini-item { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; }

/* STATS CONTAINER */
.stats-container { padding: 0 20px 140px; width: 100%; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.card {
  background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(34, 211, 238, 0.1);
  padding: 12px 5px; border-radius: 12px; text-align: center; backdrop-filter: blur(10px);
}

/* FOOTER */
.footer {
  position: fixed; bottom: 0; left: 0; right: 0; height: 90px;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 40px; background: #05070a; border-top: 1px solid rgba(34,211,238,0.1); z-index: 1000;
}
.exec-btn {
  position: absolute; left: 50%; bottom: 40px; transform: translateX(-50%) rotate(45deg);
  width: 60px; height: 60px; background: #05070a; border: 2px solid #22d3ee;
  display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
}
.exec-inner { transform: rotate(-45deg); font-size: 10px; font-weight: 900; color: #22d3ee; }
</style>
</head>

<body>

  <div class="header">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-slate-800 rounded-lg flex items-center justify-center border border-slate-700">
        <span class="text-cyan-400 font-black text-xl">M</span>
      </div>
      <div>
        <div class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Profile Root</div>
        <div class="text-sm font-bold">Miftah Prime</div>
      </div>
    </div>
    <div class="bg-indigo-600 px-4 py-2 rounded-xl text-xs font-bold shadow-lg shadow-indigo-500/20 border border-indigo-400/30">Upgrades</div>
  </div>

  <div class="progress-section">
    <div class="flex justify-between items-end mb-2">
      <div class="flex items-center gap-2">
        <span class="text-sm font-bold text-cyan-400">Explorer</span>
        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-500"></i>
      </div>
      <div class="text-[11px] font-medium text-gray-400">Tier <span class="text-white">2/10</span></div>
    </div>
    <div class="w-full h-2.5 bg-slate-800 rounded-full border border-slate-700 overflow-hidden">
      <div id="level-bar" class="h-full bg-gradient-to-r from-cyan-400 to-blue-500 shadow-[0_0_10px_#22d3ee]" style="width: 35%"></div>
    </div>
  </div>

  <div class="content-area" id="tap-zone">
    <div id="score">0</div>
    
    <div class="capy-container">
        <img id="capy-img" 
             src="https://files.catbox.moe/k365m9.png" 
             alt="Cyber Capybara" />
      <div class="pedestal"></div>
    </div>

    <div class="mini-stats">
      <div class="mini-item">
        <i data-lucide="mouse-pointer-2" class="w-4 h-4 text-cyan-400"></i>
        <span>2 <span class="text-gray-500 text-[10px]">Per tap</span></span>
      </div>
      <div class="mini-item">
        <i data-lucide="gem" class="w-4 h-4 text-green-400"></i>
        <span>6480 <span class="text-gray-500 text-[10px]">Per hour</span></span>
      </div>
      <div class="mini-item">
        <i data-lucide="zap" class="w-4 h-4 text-yellow-400"></i>
        <span id="energy-val">5000</span> <span class="text-gray-500 text-[10px]">/ 5000</span>
      </div>
    </div>
  </div>

  <div class="stats-container">
    <div class="stats-grid">
      <div class="card">
        <div class="text-[10px] text-gray-500 mb-1 font-bold">STAKING</div>
        <i data-lucide="layers" class="w-4 h-4 mx-auto mb-1 text-slate-400"></i>
      </div>
      <div class="card" style="background: rgba(34, 211, 238, 0.1); border-color: rgba(34, 211, 238, 0.3);">
        <div class="text-[10px] text-cyan-400 mb-1 font-bold">MINING</div>
        <i data-lucide="pickaxe" class="w-4 h-4 mx-auto mb-1 text-cyan-400"></i>
      </div>
      <div class="card">
        <div class="text-[10px] text-gray-500 mb-1 font-bold">FRIENDS</div>
        <i data-lucide="users" class="w-4 h-4 mx-auto mb-1 text-slate-400"></i>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="nav-group flex gap-8">
      <div class="nav-item"><i data-lucide="wallet"></i></div>
      <div class="nav-item"><i data-lucide="list-checks"></i></div>
    </div>
    <div class="exec-btn"><div class="exec-inner">EXEC</div></div>
    <div class="nav-group flex gap-8">
      <div class="nav-item active text-cyan-400"><i data-lucide="layout-grid"></i></div>
      <div class="nav-item"><i data-lucide="settings"></i></div>
    </div>
  </div>

<script>
lucide.createIcons();

let score = parseInt(localStorage.getItem('miftah_score')) || 0;
let energy = parseInt(localStorage.getItem('miftah_energy')) || 5000;
const maxEnergy = 5000;
const perTap = 2;

const scoreDisplay = document.getElementById('score');
const energyDisplay = document.getElementById('energy-val');
const capyImg = document.getElementById('capy-img');
const tapZone = document.getElementById('tap-zone');

scoreDisplay.innerText = score.toLocaleString();
energyDisplay.innerText = energy;

const handleInput = (x, y) => {
  if (energy < perTap) {
    if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
    return;
  }

  score += perTap;
  energy -= perTap;
  
  scoreDisplay.innerText = score.toLocaleString();
  energyDisplay.innerText = energy;
  
  localStorage.setItem('miftah_score', score);
  localStorage.setItem('miftah_energy', energy);

  // Animasi Klik
  capyImg.style.transform = 'scale(0.9) translateY(10px)';
  setTimeout(() => { capyImg.style.transform = 'scale(1) translateY(0)'; }, 80);

  // Floating Number
  const plus = document.createElement('div');
  plus.innerText = `+${perTap}`;
  plus.className = 'plus-val';
  plus.style.left = `${x - 20}px`;
  plus.style.top = `${y - 50}px`;
  document.body.appendChild(plus);
  setTimeout(() => plus.remove(), 800);

  if (navigator.vibrate) navigator.vibrate(15);
};

// Auto Regen Energy
setInterval(() => {
  if (energy < maxEnergy) {
    energy++;
    energyDisplay.innerText = energy;
    localStorage.setItem('miftah_energy', energy);
  }
}, 1000);

tapZone.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    handleInput(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
  }
}, { passive: false });

tapZone.addEventListener('mousedown', (e) => {
  if (window.matchMedia("(pointer: coarse)").matches) return;
  handleInput(e.clientX, e.clientY);
});
</script>

</body>
</html>

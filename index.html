<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wealth OS - Pulse of Authority</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at center, #0a0a0a 0%, #030303 100%); /* Smoother dark gradient */
            color: #d6d3d1; 
            touch-action: none; 
            overflow: hidden;
            user-select: none;
        }

        /* Institutional Hard Edges */
        .stats-panel { 
            background: rgba(255,255,255,0.01); /* Reduced background opacity */
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* Tabular Nums & Letter Spacing */
        #score {
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.06em;
            text-shadow: 0 0 40px rgba(6, 182, 212, 0.25); /* Cyan Glow */
            color: #22d3ee; /* Cyan-400 - The Life Color */
            
            /* The Breathing Pulse Animation */
            animation: breathe 5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { text-shadow: 0 0 30px rgba(6, 182, 212, 0.2); }
            50% { text-shadow: 0 0 50px rgba(6, 182, 212, 0.4); }
        }

        /* Interaction: Snap over Bounce */
        #tap-container {
            transition: transform 0.06s ease-out;
            will-change: transform;
        }
        #tap-container:active {
            transform: scale(0.98);
        }

        #parallax-wrap {
            transition: transform 0.2s ease-out;
        }

        /* The Ghost Mask - Character focus */
        .char-mask {
            background: radial-gradient(circle, transparent 20%, #030303 90%);
        }

        /* Mascot Styling: Rim Light & Darkness */
        #capy-img {
            filter: contrast(1.1) brightness(0.9);
            drop-shadow(0 0 30px rgba(56, 189, 248, 0.2)); /* Cyberpunk Rim Light */
            animation: charFloat 7s ease-in-out infinite;
        }

        @keyframes charFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Icon Utility */
        .lucide { stroke-width: 1.5px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="relative z-50 p-8 flex justify-between items-start">
        <div class="flex items-center gap-3 stats-panel py-3 px-5 rounded-2xl">
            <div class="w-8 h-8 rounded-xl bg-cyan-950/30 flex items-center justify-center font-black text-cyan-400 text-xs">M</div>
            <div>
                <p class="text-[9px] text-zinc-600 font-black uppercase tracking-[0.3em] mb-1">Authenticated</p>
                <p class="text-xs font-bold tracking-tight text-zinc-200">Miftah_Daily_Hub.terminal</p>
            </div>
        </div>
        <div class="flex items-center gap-2 px-4 py-3 bg-cyan-950/20 rounded-full border border-cyan-500/10">
            <div class="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse"></div>
            <span class="text-[9px] font-black text-cyan-400 uppercase tracking-widest">Stable Sync</span>
        </div>
    </header>

    <div class="relative z-50 text-center mt-6 flex-shrink-0">
        <p class="text-[10px] font-black text-zinc-700 uppercase tracking-[0.5em] mb-4">Total Allocation</p>
        <div class="flex items-baseline justify-center gap-1">
            <h1 id="score" class="text-7xl font-black">0</h1>
            <span class="text-xl font-bold text-cyan-900 tabular-nums ml-2opacity-80">.00</span>
        </div>
        
        <div class="mt-8 px-32">
            <div class="h-[1px] bg-white/[0.04] w-full relative">
                <div id="progress-bar" class="absolute h-full bg-cyan-500 transition-all duration-700" style="width: 75%"></div>
            </div>
        </div>
    </div>

    <main class="relative flex-grow flex items-center justify-center z-10 -mt-10">
        <div id="tap-container" class="relative cursor-pointer">
            <div id="parallax-wrap" class="relative">
                <div class="absolute inset-0 z-20 pointer-events-none char-mask scale-125"></div>
                <img id="capy-img"
                    src="https://image.pollinations.ai/prompt/hyper-realistic_3D_capybara_obsidian_texture_minimalist_lighting_black_background_high_fashion_style_--ar_1:1"
                    class="relative z-10 w-72 h-72 md:w-96 md:h-96 object-containgrayscale saturate-0 brightness-[0.8] contrast-[1.2] select-none pointer-events-none"
                    alt="Asset">
            </div>
        </div>
    </main>

    <div class="relative z-50 px-8 grid grid-cols-3 gap-6 mb-28">
        <div class="py-4 rounded-2xl flex flex-col items-center">
            <span class="text-[8px] font-black text-zinc-700 uppercase tracking-[0.25em] mb-2">Yield / Action</span>
            <span class="text-sm font-bold text-zinc-500 tabular-nums">+1.00</span>
        </div>
        <div class="stats-panel py-5 rounded-2xl flex flex-col items-center -translate-y-2 border-white/5">
            <span class="text-[8px] font-black text-zinc-500 uppercase tracking-[0.3em] mb-2">PPh Index</span>
            <span class="text-sm font-black text-zinc-200 tabular-nums">7.5M</span>
        </div>
        <div class="py-4 rounded-2xl flex flex-col items-center">
            <span class="text-[8px] font-black text-zinc-700 uppercase tracking-[0.25em] mb-2">Sync Grade</span>
            <span class="text-sm font-bold text-zinc-500 tabular-nums">98.2%</span>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 h-20 bg-cyan-950/10 backdrop-blur-3xl border-t border-cyan-500/5 flex items-center justify-around px-10 pb-4 z-50">
        <div class="flex items-center gap-10">
            <i data-lucide="layers" class="w-5 h-5 text-zinc-600 hover:text-cyan-400 transition-colors"></i>
            <i data-lucide="bar-chart-3" class="w-5 h-5 text-zinc-600 hover:text-cyan-400 transition-colors"></i>
        </div>

        <div class="absolute -top-7 left-1/2 -translate-x-1/2">
            <div class="w-16 h-16 bg-zinc-950/20 backdrop-blur-2xl rounded-full p-1 border border-cyan-500/10 active:scale-90 transition-all shadow-none">
                <div class="w-full h-full rounded-full bg-zinc-900/20 flex items-center justify-center border border-cyan-500/5">
                    <span class="text-[10px] font-black text-cyan-500 tracking-widest uppercase">EXEC</span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-10">
            <i data-lucide="shield-check" class="w-5 h-5 text-cyan-400"></i> <i data-lucide="command" class="w-5 h-5 text-zinc-600 hover:text-cyan-400 transition-colors"></i>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        const scoreEl = document.getElementById('score');
        const tapContainer = document.getElementById('tap-container');
        const parallaxWrap = document.getElementById('parallax-wrap');
        let currentScore = 0;

        // Inertial Parallax
        document.addEventListener('pointermove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 80;
            const y = (window.innerHeight / 2 - e.clientY) / 80;
            parallaxWrap.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Response Physics
        tapContainer.addEventListener('pointerdown', (e) => {
            currentScore += 1;
            scoreEl.innerText = Math.floor(currentScore).toLocaleString('en-US');
            
            // Hard Snap
            scoreEl.animate([
                { transform: 'scale(1.02)', opacity: 0.8 },
                { transform: 'scale(1)', opacity: 1 }
            ], { duration: 60, easing: 'ease-out' });

            // Micro Signal: White Thread
            const signal = document.createElement('div');
            signal.className = 'fixed w-[1px] h-3 bg-cyan-400/50 pointer-events-none z-[60]';
            signal.style.left = `${e.clientX}px`; 
            signal.style.top = `${e.clientY}px`;
            document.body.appendChild(signal);
            
            signal.animate([
                { transform: 'scaleY(1)', opacity: 1 },
                { transform: 'translateY(-15px) scaleY(0)', opacity: 0 }
            ], { duration: 300, easing: 'cubic-bezier(0.4, 0, 0.2, 1)' });
            
            setTimeout(() => signal.remove(), 300);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>Wealth OS — Miftah Prime</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Inter',sans-serif;
  overflow:hidden;
  user-select:none;
  background:#05070a;
  color:#e7e5e4;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(34,211,238,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,211,238,0.03) 1px, transparent 1px);
  background-size:30px 30px;
  z-index:-1;
}

/* HEADER */
.header{
  padding:24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.glass{
  background:rgba(10,15,20,.8);
  border:1px solid rgba(34,211,238,.15);
  backdrop-filter:blur(15px);
  box-shadow:0 15px 35px rgba(0,0,0,.8);
}

/* SCORE */
.score{
  text-align:center;
  margin-top:10px;
}

#score{
  font-size:64px;
  font-weight:900;
  color:white;
}

/* MAIN */
.main{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:420px;
  position:relative;
}

#capy-img{
  max-width:320px;
  filter:drop-shadow(0 0 20px black);
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

.pedestal{
  width:280px;
  height:20px;
  background:#111;
  border-top:2px solid rgba(34,211,238,.4);
  margin:0 auto;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  padding:20px;
}

.card{
  background:rgba(10,15,20,.8);
  border:1px solid rgba(34,211,238,.15);
  padding:14px;
  border-radius:12px;
  text-align:center;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:90px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 40px;
  background:rgba(5,7,10,.95);
  border-top:1px solid rgba(34,211,238,.1);
}

.nav{
  display:flex;
  gap:70px;
}

.nav i{
  cursor:pointer;
  color:#3f3f46;
}

.nav i.active{
  color:#22d3ee;
  filter:drop-shadow(0 0 8px #22d3ee);
}

/* EXEC */
.exec{
  position:absolute;
  left:50%;
  transform:translateX(-50%) rotate(45deg);
  width:64px;
  height:64px;
  background:#0a0a0a;
  border:1px solid rgba(34,211,238,.4);
  display:flex;
  justify-content:center;
  align-items:center;
}

.exec div{
  transform:rotate(-45deg);
  font-size:10px;
  font-weight:900;
  color:#22d3ee;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div style="font-weight:900;color:#22d3ee">M</div>
    <div style="font-size:10px;color:#888">Security Level: Prime</div>
    <div style="font-size:12px;color:white;font-weight:700">Miftah_Prime_OS</div>
  </div>

  <div class="glass" style="padding:8px 14px;border-radius:10px">
    Encrypted
  </div>
</div>

<!-- SCORE -->
<div class="score">
  <div style="font-size:10px;color:#888;letter-spacing:4px">Resource Allocation</div>
  <div id="score">0</div>
  <div style="color:#22d3ee;font-weight:800">.00 Units</div>
</div>

<!-- MAIN -->
<div class="main">

  <div>
    <img id="capy-img"
      src="https://image.pollinations.ai/prompt/ultra_realistic_front_view_capybara_brown_fur_dark_background_cyan_rim_light_standing_on_black_stone_pedestal_stoic_cinematic_mood_high_detail_clean_background_full_body_centered_no_crop_--ar_1:1"
      alt="core" />

    <div class="pedestal"></div>
  </div>

</div>

<!-- STATS -->
<div class="stats">
  <div class="card">
    Hash Rate<br><b>+1.0</b>
  </div>

  <div class="card">
    Index PPh<br><b style="color:#22d3ee">7.5M</b>
  </div>

  <div class="card">
    Uptime<br><b>99.9%</b>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">

  <div class="nav">
    <i data-lucide="database" onclick="location.href='nodes.html'"></i>
    <i data-lucide="activity" onclick="location.href='stats.html'"></i>
  </div>

  <div class="exec" onclick="location.href='exec.html'">
    <div>EXEC</div>
  </div>

  <div class="nav">
    <i data-lucide="shield" class="active" onclick="location.href='security.html'"></i>
    <i data-lucide="cpu" onclick="location.href='terminal.html'"></i>
  </div>

</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
lucide.createIcons();
</script>

</body>
</html>

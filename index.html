<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoCapy - Pro Motion Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: #fff; touch-action: none; overflow: hidden; }

        /* ===== 1. PARALLAX WRAPPER (STANDALONE LAYER) ===== */
        #parallax-wrap {
            will-change: transform;
            transition: transform .12s ease-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== 2. CHARACTER IDLE (PURE CSS ANIMATION) ===== */
        #capy-img {
            transform-origin: center;
            /* Filter awal untuk nyalakan visual */
            filter: contrast(1.08) saturate(1.05) brightness(1.02);
            image-rendering: auto;
            transition: filter 0.2s ease;
        }

        @keyframes floaty {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-14px) rotate(1deg); }
        }
        .animate-float { animation: floaty 4s ease-in-out infinite; }

        /* ===== 3. REWARD FEEL (TAP INTERACTION LIGHTING) ===== */
        #tap-container:active #capy-img {
            filter: brightness(1.15) saturate(1.2) drop-shadow(0 0 30px rgba(251,191,36,0.35));
        }

        /* ===== 4. ROTATING AURA & PARTICLES ===== */
        @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spinReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        .animate-spin-slow { animation: spinSlow 20s linear infinite; }
        .animate-spin-reverse { animation: spinReverse 14s linear infinite; }

        .particles::before, .particles::after {
            content: ''; position: absolute; inset: 0;
            background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,.1) 1px, transparent 1px), radial-gradient(circle at 70% 60%, rgba(255,215,0,.1) 1px, transparent 1px);
            animation: particleMove 10s linear infinite;
        }
        @keyframes particleMove { from { transform: translateY(0px); } to { transform: translateY(-40px); } }

        /* ===== 5. UI COMPONENTS ===== */
        .glass-stats { background: linear-gradient(180deg, rgba(30,30,30,0.6) 0%, rgba(10,10,10,0.8) 100%); border: 1px solid rgba(255,255,255,0.05); }
        .score-pop { animation: scorePop .25s ease; }
        @keyframes scorePop { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.08); filter: brightness(1.8); } }
        
        /* Floating Coins */
        .coin { position: absolute; z-index: 30; font-size: 1.8rem; filter: drop-shadow(0 0 10px rgba(255,215,0,.3)); animation: floatCoin 4s ease-in-out infinite; }
        .coin-1 { top: 15%; right: -10px; }
        .coin-2 { top: 35%; right: -30px; animation-delay: 1s; }
        .coin-3 { top: 55%; left: -20px; animation-delay: 2s; }
        @keyframes floatCoin { 0%, 100% { transform: translateY(0px); opacity: .7; } 50% { transform: translateY(-12px); opacity: 1; } }
    </style>
</head>
<body class="h-screen flex flex-col p-safe">

    <header class="relative z-40 p-5 flex justify-between items-center">
        <div class="flex items-center gap-3 glass-stats py-2 px-3 rounded-2xl">
            <div class="w-9 h-9 rounded-xl bg-zinc-800 flex items-center justify-center border border-white/10 font-bold">M</div>
            <div>
                <p class="text-[9px] text-zinc-500 font-extrabold uppercase tracking-widest">Level 0 Newbie</p>
                <p class="text-sm font-bold leading-none">Miftah_Dev</p>
            </div>
        </div>
        <button class="glass-stats w-10 h-10 rounded-xl flex items-center justify-center">⚙️</button>
    </header>

    <div class="relative z-40 text-center my-4">
        <div class="flex items-center justify-center gap-3">
            <img src="https://img.icons8.com/emoji/96/gold-coin.png" class="w-10 h-10" alt="coin">
            <h1 id="score" class="text-6xl font-black italic tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-white to-zinc-500">0</h1>
        </div>
        <div class="mt-4 px-12">
            <div class="h-1.5 bg-zinc-900 rounded-full border border-white/5 overflow-hidden">
                <div class="h-full bg-yellow-500/80" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <main class="relative flex-grow flex items-center justify-center z-10 overflow-hidden">
        <div class="absolute w-[500px] h-[500px] rounded-full bg-yellow-500/10 blur-[120px]"></div>
        <div class="absolute w-[420px] h-[420px] rounded-full border border-yellow-500/10 animate-spin-slow"></div>
        <div class="absolute w-[320px] h-[320px] rounded-full border border-cyan-400/10 animate-spin-reverse"></div>
        <div class="particles absolute inset-0 pointer-events-none"></div>

        <div id="tap-container" class="relative transition-all duration-200 active:scale-95 cursor-pointer">
            
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-56 h-12 bg-black/60 blur-2xl rounded-full"></div>

            <div id="parallax-wrap">
                <img id="capy-img"
                    src="https://image.pollinations.ai/prompt/stylized_3D_capybara_mascot_character_isolated_on_black_background_no_floor_no_shadow_clean_shading_high_quality_game_asset_--ar_1:1"
                    class="relative z-10 w-72 h-72 md:w-[26rem] md:h-[26rem] object-contain animate-float select-none pointer-events-none"
                    alt="CryptoCapy">
            </div>

            <div class="coin coin-1">🪙</div>
            <div class="coin coin-2">🪙</div>
            <div class="coin coin-3">🪙</div>

            <div class="absolute top-10 right-4 z-20 px-3 py-1 rounded-full bg-yellow-500/20 border border-yellow-400/20 backdrop-blur-xl">
                <p class="text-[10px] font-black tracking-widest text-yellow-300 uppercase">Legendary</p>
            </div>
        </div>
    </main>

    <div class="relative z-40 px-5 grid grid-cols-3 gap-3 -translate-y-6">
        <div class="glass-stats p-4 rounded-[1.5rem] flex flex-col items-center">
            <span class="text-[8px] font-black text-zinc-500 uppercase">+1 Tap</span>
        </div>
        <div class="glass-stats p-4 rounded-[1.5rem] flex flex-col items-center border-yellow-500/20 scale-105 shadow-2xl">
            <span class="text-[8px] font-black text-zinc-500 uppercase">0/hr</span>
        </div>
        <div class="glass-stats p-4 rounded-[1.5rem] flex flex-col items-center">
            <span class="text-[8px] font-black text-zinc-500 uppercase">50 Energy</span>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 h-24 backdrop-blur-3xl bg-black/70 border-t border-white/5 flex items-center justify-around px-4 pb-2 z-50">
        <div class="flex gap-10 opacity-30 text-xl"><span>📚</span><span>📋</span></div>
        <div class="absolute -top-8 left-1/2 -translate-x-1/2 w-20 h-20 bg-zinc-950 rounded-full border-4 border-yellow-500/40 flex items-center justify-center font-black text-sm">FARM</div>
        <div class="flex gap-10 opacity-30 text-xl"><span>👥</span><span>🐭</span></div>
    </footer>

    <script>
        const scoreEl = document.getElementById('score');
        const tapContainer = document.getElementById('tap-container');
        const parallaxWrap = document.getElementById('parallax-wrap');
        
        let currentScore = 0;

        // 1. PARALLAX HANDLER (Gunakan Wrapper)
        document.addEventListener('pointermove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 40;
            const y = (window.innerHeight / 2 - e.clientY) / 40;
            parallaxWrap.style.transform = `translate(${x}px, ${y}px)`;
        });

        // 2. SHOCKWAVE EFFECT
        function createShockwave(x, y) {
            const ring = document.createElement('div');
            ring.className = 'fixed w-10 h-10 rounded-full border border-yellow-400/40 pointer-events-none z-50';
            ring.style.left = `${x - 20}px`; ring.style.top = `${y - 20}px`;
            document.body.appendChild(ring);
            ring.animate([{ transform: 'scale(.5)', opacity: 1 }, { transform: 'scale(4)', opacity: 0 }], { duration: 700, easing: 'ease-out' });
            setTimeout(() => ring.remove(), 700);
        }

        // 3. TAP TEXT EFFECT
        function createTapEffect(x, y, text = '+1') {
            const plus = document.createElement('div');
            plus.innerText = text;
            plus.className = 'fixed pointer-events-none text-2xl font-black text-yellow-400 z-50';
            plus.style.left = `${x}px`; plus.style.top = `${y}px`;
            plus.style.textShadow = '0 0 20px rgba(251,191,36,0.7)';
            document.body.appendChild(plus);
            plus.animate([{ opacity: 1, transform: 'translateY(0px) scale(1)' }, { opacity: 0, transform: 'translateY(-160px) scale(2)', filter: 'blur(8px)' }], { duration: 900, easing: 'ease-out' });
            setTimeout(() => plus.remove(), 900);
        }

        // 4. MAIN INTERACTION
        tapContainer.addEventListener('pointerdown', (e) => {
            currentScore += 1;
            scoreEl.innerText = Math.floor(currentScore).toLocaleString().replace(/,/g, ' ');

            // Score Flash Visual
            scoreEl.classList.remove('score-pop');
            void scoreEl.offsetWidth; // Reset animation
            scoreEl.classList.add('score-pop');

            createTapEffect(e.clientX, e.clientY);
            createShockwave(e.clientX, e.clientY);

            // Crit Chance
            if (Math.random() > 0.92) {
                createTapEffect(e.clientX, e.clientY, 'CRIT +12');
                currentScore += 12;
            }
        });
    </script>
</body>
</html>

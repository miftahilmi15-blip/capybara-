<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Wealth OS — Miftah Prime</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
* {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}

body {
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  user-select: none;
  background: #05070a;
  color: #e7e5e4;
  height: 100vh;
  display: flex; flex-direction: column;
}

body::after {
  content: ''; position: fixed; inset: 0;
  background: 
    linear-gradient(rgba(34,211,238,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,211,238,0.03) 1px, transparent 1px);
  background-size: 30px 30px; z-index: -1;
}

/* HEADER */
.header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }

/* PROGRESS AREA */
.progress-section { width: 100%; padding: 0 24px; margin-bottom: 5px; }

/* CENTER AREA */
.content-area {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center; position: relative; width: 100%;
}

#score {
  font-size: 72px; font-weight: 900; color: white;
  line-height: 1; margin-bottom: 10px;
  text-shadow: 0 0 40px rgba(34, 211, 238, 0.4);
}

/* CAPYBARA */
.capy-container { position: relative; width: 300px; pointer-events: none; }
.float-wrapper { animation: float 4s ease-in-out infinite; display: flex; justify-content: center; }
#capy-img {
  width: 100%; filter: drop-shadow(0 0 50px rgba(0,0,0,1));
  transition: transform 0.08s cubic-bezier(0.2, 0.8, 0.2, 1.2);
}
.pedestal {
  width: 240px; height: 15px; background: #0a0a0a;
  border-top: 2px solid rgba(34,211,238,0.6);
  border-radius: 50% / 100% 100% 0 0; margin: -20px auto 0;
}

@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

/* FLOATING TEXT (+2) */
.plus-val {
  position: absolute; color: #22d3ee; font-weight: 900; font-size: 32px;
  pointer-events: none; animation: flyUp 0.7s ease-out forwards; z-index: 100;
  text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
}
@keyframes flyUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-150px) scale(1.5); opacity: 0; } }

/* STATS AREA */
.stats-container { padding: 0 16px 160px; flex-shrink: 0; width: 100%; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.card {
  background: rgba(10, 15, 20, 0.9); border: 1px solid rgba(34, 211, 238, 0.2);
  padding: 14px 8px; border-radius: 16px; text-align: center;
  backdrop-filter: blur(12px); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

/* FOOTER */
.footer {
  position: fixed; bottom: 0; left: 0; right: 0; height: 95px;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 40px; background: rgba(5, 7, 10, 0.98);
  border-top: 1px solid rgba(34, 211, 238, 0.2); z-index: 1000;
}
.nav-group { display: flex; gap: 50px; }
.nav-item { color: #3f3f46; cursor: pointer; transition: 0.3s; }
.nav-item.active { color: #22d3ee; filter: drop-shadow(0 0 8px #22d3ee); }
.exec-btn {
  position: absolute; left: 50%; bottom: 45px; transform: translateX(-50%) rotate(45deg);
  width: 65px; height: 65px; background: #05070a; border: 2px solid #22d3ee;
  display: flex; justify-content: center; align-items: center; box-shadow: 0 0 25px rgba(34, 211, 238, 0.4);
}
.exec-inner { transform: rotate(-45deg); font-size: 11px; font-weight: 900; color: #22d3ee; letter-spacing: 1px; }
</style>
</head>

<body>

  <div class="header">
    <div>
      <div style="font-weight:900;color:#22d3ee;font-size:24px;">M</div>
      <div style="font-size:12px;color:white;font-weight:700;letter-spacing:1px">Miftah_Prime_OS</div>
    </div>
    <div class="glass" style="background:rgba(10,15,20,0.8); padding:8px 16px; border-radius:12px; border:1px solid rgba(34,211,238,0.2); font-size:11px;">
      <span style="color:#22d3ee; margin-right: 5px;">●</span> SECURITY: ACTIVE
    </div>
  </div>

  <div class="progress-section">
    <div class="flex justify-between items-end mb-1 px-1">
      <div class="text-[10px] font-bold text-cyan-400 uppercase tracking-tighter">Rank: Explorer</div>
      <div class="text-[10px] font-bold text-gray-500">Level 2/10</div>
    </div>
    <div class="w-full h-1.5 bg-slate-900 rounded-full border border-slate-800 overflow-hidden">
      <div id="level-bar" class="h-full bg-cyan-500 shadow-[0_0_10px_#22d3ee]" style="width: 35%"></div>
    </div>
  </div>

  <div class="content-area" id="tap-zone">
    <div id="score">0</div>

    <div class="capy-container">
      <div class="float-wrapper">
        <img id="capy-img" 
             src="https://image.pollinations.ai/prompt/ultra_realistic_front_view_capybara_brown_fur_dark_background_cyan_rim_light_standing_on_black_stone_pedestal_stoic_cinematic_mood_high_detail_clean_background_full_body_centered_no_crop_--ar_1:1" 
             alt="Core" />
      </div>
      <div class="pedestal"></div>
    </div>
  </div>

  <div class="stats-container">
    <div class="stats-grid">
      <div class="card">
        <div style="font-size:10px; color:#555; font-weight:800; margin-bottom:2px;">PER TAP</div>
        <b id="tap-val" style="font-size:16px; color:white">+2</b>
      </div>
      <div class="card">
        <div style="font-size:10px; color:#555; font-weight:800; margin-bottom:2px;">ENERGY</div>
        <b id="energy-val" style="font-size:16px; color:#22d3ee">5000</b>
      </div>
      <div class="card">
        <div style="font-size:10px; color:#555; font-weight:800; margin-bottom:2px;">HOURLY</div>
        <b style="font-size:16px; color:white">6.4K</b>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="nav-group">
      <div class="nav-item"><i data-lucide="database"></i></div>
      <div class="nav-item"><i data-lucide="activity"></i></div>
    </div>
    <div class="exec-btn"><div class="exec-inner">EXEC</div></div>
    <div class="nav-group">
      <div class="nav-item active"><i data-lucide="shield"></i></div>
      <div class="nav-item"><i data-lucide="cpu"></i></div>
    </div>
  </div>

<script>
lucide.createIcons();

// --- STATE MANAGEMENT ---
let score = parseInt(localStorage.getItem('miftah_prime_score')) || 0;
let energy = parseInt(localStorage.getItem('miftah_energy')) || 5000;
const maxEnergy = 5000;
const perTap = 2;

const scoreDisplay = document.getElementById('score');
const energyDisplay = document.getElementById('energy-val');
const tapZone = document.getElementById('tap-zone');
const capyImg = document.getElementById('capy-img');

scoreDisplay.innerText = score.toLocaleString();
energyDisplay.innerText = energy;

// --- CLICK LOGIC ---
const handleInput = (x, y) => {
  if (energy < perTap) {
    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
    return;
  }

  score += perTap;
  energy -= perTap;
  
  scoreDisplay.innerText = score.toLocaleString();
  energyDisplay.innerText = energy;
  
  localStorage.setItem('miftah_prime_score', score);
  localStorage.setItem('miftah_energy', energy);

  // Bounce Effect
  capyImg.style.transform = 'scale(0.92)';
  setTimeout(() => { capyImg.style.transform = 'scale(1)'; }, 80);

  // Floating +2
  const plus = document.createElement('div');
  plus.innerText = `+${perTap}`;
  plus.className = 'plus-val';
  plus.style.left = `${x - 20}px`;
  plus.style.top = `${y - 40}px`;
  document.body.appendChild(plus);
  setTimeout(() => plus.remove(), 700);

  if (navigator.vibrate) navigator.vibrate(12);
};

// --- REGEN SYSTEM ---
setInterval(() => {
  if (energy < maxEnergy) {
    energy += 1;
    energyDisplay.innerText = energy;
    localStorage.setItem('miftah_energy', energy);
  }
}, 1000);

// --- INPUT LISTENERS ---
tapZone.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    handleInput(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
  }
}, { passive: false });

tapZone.addEventListener('mousedown', (e) => {
  if (window.matchMedia("(pointer: coarse)").matches) return;
  handleInput(e.clientX, e.clientY);
});
</script>

</body>
</html>

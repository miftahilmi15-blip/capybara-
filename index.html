<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoCapy - Premium Native Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #050505; 
            color: #fff; 
            touch-action: none; 
            overflow: hidden;
            user-select: none;
        }

        /* Cinematic Grain: Subtler (0.01 opacity) */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: .01;
            background-image: radial-gradient(rgba(255,255,255,.6) 1px, transparent 1px);
            background-size: 4px 4px;
            z-index: 100;
        }

        #parallax-wrap {
            will-change: transform;
            transition: transform 0.3s ease-out;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        /* MODERN BLANK INTERACTION: Total Ghosting on Tap */
        #tap-container {
            transition: opacity 0.05s ease-in-out;
        }
        #tap-container:active {
            opacity: 0;
        }

        #capy-img {
            transform-origin: center;
            filter: contrast(1.05) brightness(1) drop-shadow(0 15px 35px rgba(0,0,0,0.6));
        }

        @keyframes floaty {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }
        .animate-float { animation: floaty 6s ease-in-out infinite; }

        /* FIX 2 & 3: Ghost Cards (iOS Native Style) */
        .glass-stats { 
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(20px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
            border: none; /* Border removed */
        }

        /* Instant Flash for Score */
        .score-pop { animation: quickFlash 0.1s ease-out; }
        @keyframes quickFlash {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .lucide { width: 18px; height: 18px; stroke-width: 2.2px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="relative z-50 p-6 flex justify-between items-center">
        <div class="flex items-center gap-3 glass-stats py-2 px-4 rounded-2xl">
            <div class="w-8 h-8 rounded-xl bg-zinc-900 flex items-center justify-center font-bold text-yellow-600/80 text-xs">M</div>
            <div>
                <p class="text-[8px] text-zinc-600 font-bold uppercase tracking-[0.18em] mb-0.5">Player</p>
                <p class="text-sm font-extrabold tracking-tight">Miftah_Dev</p>
            </div>
        </div>
        <button class="glass-stats w-10 h-10 rounded-xl flex items-center justify-center active:opacity-0 transition-opacity text-zinc-500">
            <i data-lucide="settings"></i>
        </button>
    </header>

    <div class="relative z-50 text-center mt-2 mb-6">
        <div class="flex items-center justify-center gap-3 mb-1">
            <i data-lucide="coins" class="text-white/20 w-4 h-4"></i>
            <h1 id="score" class="text-5xl font-extrabold tracking-tighter text-white/95">0</h1>
        </div>
        <div class="mt-6 px-24">
            <div class="h-[2px] bg-white/[0.04] rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full rounded-full bg-white/30" style="width: 35%"></div>
            </div>
        </div>
    </div>

    <main class="relative flex-grow flex items-center justify-center z-10 overflow-hidden">
        <div class="absolute w-[220px] h-[220px] rounded-full bg-yellow-600/[0.015] blur-[100px]"></div>

        <div id="tap-container" class="relative cursor-pointer">
            <div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-32 h-6 bg-black/60 blur-3xl rounded-full"></div>
            
            <div id="parallax-wrap" class="relative">
                <div class="absolute inset-0 z-20 pointer-events-none scale-110 
                    bg-[radial-gradient(circle,transparent_45%,#050505_80%)]">
                </div>

                <img id="capy-img"
                    src="https://image.pollinations.ai/prompt/3D_pixar_style_capybara_character_centered_pose_mobile_game_mascot_black_background_--ar_1:1"
                    class="relative z-10 w-64 h-64 md:w-[22rem] md:h-[22rem] object-contain animate-float select-none pointer-events-none"
                    alt="CryptoCapy">
            </div>

            <div class="absolute top-6 right-2 z-40 px-2 py-0.5 rounded bg-white/[0.03]">
                <p class="text-[7px] font-bold tracking-[0.18em] text-zinc-600 uppercase">Legendary</p>
            </div>
        </div>
    </main>

    <div class="relative z-50 px-10 grid grid-cols-3 gap-3 -translate-y-1">
        <div class="glass-stats py-3 rounded-2xl flex flex-col items-center">
            <span class="text-[7px] font-bold text-zinc-600 uppercase tracking-[0.18em] mb-1.5">Tap Profit</span>
            <span class="text-xs font-extrabold text-zinc-400">+1</span>
        </div>
        <div class="glass-stats py-3 rounded-2xl flex flex-col items-center">
            <span class="text-[7px] font-bold text-zinc-600 uppercase tracking-[0.18em] mb-1.5">Hourly</span>
            <span class="text-xs font-extrabold text-white/80">1.2K</span>
        </div>
        <div class="glass-stats py-3 rounded-2xl flex flex-col items-center">
            <span class="text-[7px] font-bold text-zinc-600 uppercase tracking-[0.18em] mb-1.5">Energy</span>
            <span class="text-xs font-extrabold text-zinc-400">1K</span>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 h-16 bg-black/70 backdrop-blur-xl border-t border-white/[0.02] flex items-center justify-around px-12 pb-2 z-50">
        <div class="flex items-center gap-8 text-zinc-600">
            <i data-lucide="gem" class="hover:text-white transition-colors"></i>
            <i data-lucide="clipboard-list" class="hover:text-white transition-colors"></i>
        </div>

        <div class="absolute -top-7 left-1/2 -translate-x-1/2">
            <div class="w-16 h-16 bg-zinc-950 rounded-full p-1 border border-white/[0.03] active:opacity-0 transition-opacity shadow-none">
                <div class="w-full h-full rounded-full bg-zinc-900/40 flex flex-col items-center justify-center border border-white/[0.03]">
                    <span class="text-[9px] font-bold text-white/40 tracking-tighter leading-none mb-0.5">FARM</span>
                    <span class="text-[7px] font-bold text-white/20">0.00</span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-8 text-zinc-600">
            <i data-lucide="users" class="hover:text-white transition-colors"></i>
            <i data-lucide="gamepad-2" class="hover:text-white transition-colors"></i>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        const scoreEl = document.getElementById('score');
        const tapContainer = document.getElementById('tap-container');
        const parallaxWrap = document.getElementById('parallax-wrap');
        let currentScore = 0;

        document.addEventListener('pointermove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 95;
            const y = (window.innerHeight / 2 - e.clientY) / 95;
            parallaxWrap.style.transform = `translate(${x}px, ${y}px)`;
        });

        // FIX 9: Subtle Yellow Spark
        function createSpark(x, y) {
            const spark = document.createElement('div');
            spark.className = 'fixed w-1 h-1 bg-yellow-500/40 rounded-full pointer-events-none z-[60]';
            spark.style.left = `${x}px`; spark.style.top = `${y}px`;
            document.body.appendChild(spark);
            
            spark.animate([
                { opacity: 1, scale: 1 },
                { opacity: 0, scale: 10 }
            ], { duration: 350, easing: 'ease-out' });
            
            setTimeout(() => spark.remove(), 350);
        }

        tapContainer.addEventListener('pointerdown', (e) => {
            currentScore += 1;
            scoreEl.innerText = Math.floor(currentScore).toLocaleString();
            
            scoreEl.classList.remove('score-pop');
            void scoreEl.offsetWidth;
            scoreEl.classList.add('score-pop');

            createSpark(e.clientX, e.clientY);
        });
    </script>
</body>
</html>
